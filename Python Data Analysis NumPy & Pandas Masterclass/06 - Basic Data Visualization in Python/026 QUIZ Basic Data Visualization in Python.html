<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />

    <title>Quiz</title>

    <style>
      body {
        font-family: sf pro text, -apple-system, BlinkMacSystemFont, Roboto,
          segoe ui, Helvetica, Arial, sans-serif, apple color emoji,
          segoe ui emoji, segoe ui symbol;
        font-weight: 400;
        line-height: 22.4px;
        font-size: 16px;
      }
      p,
      h1,
      h2,
      h3,
      h4,
      h5,
      h6,
      ul,
      ol {
        font-size: 16px;
        font-weight: 400;
      }
      ul {
        list-style: none;
        margin: 0;
        padding: 0;
        max-width: none;
      }
      code {
        background-color: #fff;
        border: 1px solid #d1d7dc;
        color: #b4690e;
        font-size: 90%;
        padding: 0.2rem 0.4rem;
      }
      .quiz-content {
        padding: 2.4rem;
        word-break: break-word;
        max-width: 86rem;
        margin: 0 auto;
      }
      .quiz-container {
        margin: 0 auto;
        max-width: 84rem;
        padding: 0;
      }
      .question {
        margin-bottom: 5rem;
      }
      .question span {
        font-size: 24px;
        font-weight: 700;
      }
      .question-prompt {
        margin-top: 0.8rem;
        font-weight: 700;
      }
      .question-answer {
        margin-top: 1.6rem;
        padding-left: 0;
        box-sizing: border-box;
      }
      .question-answer label {
        max-width: 80rem;
        position: relative;
        cursor: pointer;
        display: flex;
        min-width: 18rem;
        border: solid #1c1d1f 2px;
      }
      .question-answer div {
        display: flex;
        align-items: center;
        padding: 0.5rem;
        width: 100%;
      }
      .question-answer div:hover {
        background-color: #f5f5f5;
      }
      .question-answer input {
        display: none;
      }
      .question-answer span {
        width: 1rem;
        height: 1rem;
        margin-right: 1.6rem;
        top: 0;
        border-radius: 50%;
        display: inline-block;
        flex-shrink: 0;
        border: 0.2rem solid #1c1d1f;
        position: relative;
      }
      .selected {
        background: #1c1d1f;
        box-shadow: 0 0 0 0.4rem #fff inset;
      }
      .score {
              position: fixed;
            }
    </style>
  </head>

  <body onload="main()">
    <div id="score" class="score">
      <span>Score: N/A of N/A</span>
    </div>
    <div id="quiz-container" class="quiz-content"></div>

    <script>
      const quizData = {"pass_percent": 70, "questions": [{"_class": "assessment", "id": 49355742, "assessment_type": "multiple-choice", "prompt": {"question": "<p>Which plot will be create with the .plot() method if no type is specified?</p>", "relatedLectureIds": ["33233748"], "feedbacks": ["", "Line chart is the default chart for the .plot() method.", "", ""], "answers": ["<p>Bar</p>", "<p>Line</p>", "<p>Scatter</p>", "<p>Histogram</p>"]}, "correct_response": ["b"], "section": "", "question_plain": "Which plot will be create with the .plot() method if no type is specified?", "related_lectures": [{"_class": "lecture", "id": 33233748, "title": "The matplotlib API & The .plot() Method", "created": "2022-07-25T12:55:35Z", "is_published": true, "asset": {"_class": "asset", "id": 42842878, "asset_type": "Video", "title": "S5L1_Plot_Method_V2.mp4", "created": "2022-08-02T17:42:31Z"}, "object_index": 137, "url": "/course/python-pandas/learn/lecture/33233748"}]}, {"_class": "assessment", "id": 49355744, "assessment_type": "multiple-choice", "prompt": {"question": "<p>How can we assign a new set of colors to our chart?</p>", "relatedLectureIds": ["33233760"], "feedbacks": ["", "", "cmap= allows us to specify one of many pre-created colormaps, or we can create our own.", ""], "answers": ["<p>c=</p>", "<p>colors=</p>", "<p>cmap=</p>", "<p>colormap=</p>"]}, "correct_response": ["c"], "section": "", "question_plain": "How can we assign a new set of colors to our chart?", "related_lectures": [{"_class": "lecture", "id": 33233760, "title": "Chart Colors", "created": "2022-07-25T12:56:07Z", "is_published": true, "asset": {"_class": "asset", "id": 42842880, "asset_type": "Video", "title": "S5L5_Chart_Colors_V2.mp4", "created": "2022-08-02T17:42:31Z"}, "object_index": 141, "url": "/course/python-pandas/learn/lecture/33233760"}]}, {"_class": "assessment", "id": 49355748, "assessment_type": "multiple-choice", "prompt": {"question": "<p>Which argument is a recommended best practice when using subplots to plot series?</p>", "relatedLectureIds": ["33233778"], "feedbacks": ["", "Setting sharey=True ensures that our plots, like line charts, are compared on the same scale, allowing us to see which series are truly larger or smaller in magnitude.", "", ""], "answers": ["<p>Place them all in a single column.</p>", "<p>Set sharey=True to place the charts on the same scale ensure the series can be compared fairly by your audience.</p>", "<p>Place them all in a single row.</p>", "<p>It's generally advised NOT to use subplots. Instead, combine charts in a tool like Excel or Powerpoint.</p>"]}, "correct_response": ["b"], "section": "", "question_plain": "Which argument is a recommended best practice when using subplots to plot series?", "related_lectures": [{"_class": "lecture", "id": 33233778, "title": "Subplots & Figure Size", "created": "2022-07-25T12:56:43Z", "is_published": true, "asset": {"_class": "asset", "id": 42842886, "asset_type": "Video", "title": "S5L11_Subplots_and_FigSize_V2.mp4", "created": "2022-08-02T17:42:54Z"}, "object_index": 147, "url": "/course/python-pandas/learn/lecture/33233778"}]}, {"_class": "assessment", "id": 49355750, "assessment_type": "multiple-choice", "prompt": {"question": "<p>Which code produced the following chart?</p><img src=\"https://img-c.udemycdn.com/redactor/raw/quiz_question/2022-07-26_01-22-32-cc90103d7dfc684dd64a9aff480b2ea1.png\">", "relatedLectureIds": ["33233792"], "feedbacks": ["", "", "Calling .plot.bar() will produce a bar plot. None of the other lines of code will produce a bar plot.", ""], "answers": ["<p>series.plot.column()</p>", "<p>series.plot()</p>", "<p>series.plot.bar()</p>", "<p>barplot(series)</p>"]}, "correct_response": ["c"], "section": "", "question_plain": "Which code produced the following chart?", "related_lectures": [{"_class": "lecture", "id": 33233792, "title": "Bar Charts", "created": "2022-07-25T12:56:59Z", "is_published": true, "asset": {"_class": "asset", "id": 42842734, "asset_type": "Video", "title": "S5L14_Bar_Charts_V2.mp4", "created": "2022-08-02T17:40:34Z"}, "object_index": 150, "url": "/course/python-pandas/learn/lecture/33233792"}]}, {"_class": "assessment", "id": 49355756, "assessment_type": "multiple-choice", "prompt": {"question": "<p>Which argument allows us to create stacked bar charts?</p>", "relatedLectureIds": ["33233794"], "feedbacks": ["", "", "By default, a multi series bar chart will be a grouped barchart. Use stacked=True to create a stacked barchart instead.", ""], "answers": ["<p>type='stacked'</p>", "<p>combine=True</p>", "<p>stacked=True</p>", "<p>None of the above</p>"]}, "correct_response": ["c"], "section": "", "question_plain": "Which argument allows us to create stacked bar charts?", "related_lectures": [{"_class": "lecture", "id": 33233794, "title": "Grouped & Stacked Bar Charts", "created": "2022-07-25T12:57:06Z", "is_published": true, "asset": {"_class": "asset", "id": 42842714, "asset_type": "Video", "title": "S5L15_Grouped_and_stacked_bar_V2.mp4", "created": "2022-08-02T17:39:31Z"}, "object_index": 151, "url": "/course/python-pandas/learn/lecture/33233794"}]}, {"_class": "assessment", "id": 49355758, "assessment_type": "multiple-choice", "prompt": {"question": "<p>Which of the following is a best practice when creating a pie chart?</p>", "relatedLectureIds": ["33233804"], "feedbacks": ["", "", "Sorting slices by their magnitude allows the audience to easily understand which slices are the largest and smallest quickly.", ""], "answers": ["<p>Have at least 10 categories of data</p>", "<p>Sort slices alphabetically</p>", "<p>Sort slices by their magnitude</p>", "<p>Start the biggest slice at 33 degrees</p>"]}, "correct_response": ["c"], "section": "", "question_plain": "Which of the following is a best practice when creating a pie chart?", "related_lectures": [{"_class": "lecture", "id": 33233804, "title": "Pie Charts & Scatterplots", "created": "2022-07-25T12:57:25Z", "is_published": true, "asset": {"_class": "asset", "id": 42842854, "asset_type": "Video", "title": "S5L18_Pie_and_Scatter_V2.mp4", "created": "2022-08-02T17:41:12Z"}, "object_index": 154, "url": "/course/python-pandas/learn/lecture/33233804"}]}, {"_class": "assessment", "id": 49355762, "assessment_type": "multiple-choice", "prompt": {"question": "<p>Which of the following charts is used to compare the relationship between two numeric columns of data?</p>", "relatedLectureIds": ["33233804"], "feedbacks": ["Scatterplots display the relationship between two numeric columns of data.", "", "", ""], "answers": ["<p>scatterplot</p>", "<p>line chart</p>", "<p>bar chart</p>", "<p>pie chart</p>"]}, "correct_response": ["a"], "section": "", "question_plain": "Which of the following charts is used to compare the relationship between two numeric columns of data?", "related_lectures": [{"_class": "lecture", "id": 33233804, "title": "Pie Charts & Scatterplots", "created": "2022-07-25T12:57:25Z", "is_published": true, "asset": {"_class": "asset", "id": 42842854, "asset_type": "Video", "title": "S5L18_Pie_and_Scatter_V2.mp4", "created": "2022-08-02T17:41:12Z"}, "object_index": 154, "url": "/course/python-pandas/learn/lecture/33233804"}]}, {"_class": "assessment", "id": 49355766, "assessment_type": "multiple-choice", "prompt": {"question": "<p>How can we save a figure as an image file?</p>", "relatedLectureIds": ["33233816"], "feedbacks": ["", "", ".savefig('filename') will save the file to our machine.", ""], "answers": ["<p>.save()</p>", "<p>.file()</p>", "<p>.savefig()</p>", "<p>Figures are saved as images by default.</p>"]}, "correct_response": ["c"], "section": "", "question_plain": "How can we save a figure as an image file?", "related_lectures": [{"_class": "lecture", "id": 33233816, "title": "Saving Plots & Further Exploration", "created": "2022-07-25T12:58:00Z", "is_published": true, "asset": {"_class": "asset", "id": 42845224, "asset_type": "Video", "title": "S5L24_Saving_Plots_and_More_Libraries_V2.mp4", "created": "2022-08-02T20:15:39Z"}, "object_index": 160, "url": "/course/python-pandas/learn/lecture/33233816"}]}, {"_class": "assessment", "id": 49355770, "assessment_type": "multiple-choice", "prompt": {"question": "<p>Which is not a library used to visualize data in Python?</p>", "relatedLectureIds": ["33233816"], "feedbacks": ["", "", "", "plotter is not a plotting library in Python."], "answers": ["<p>matplotlib</p>", "<p>seaborn</p>", "<p>plotly</p>", "<p>plotter</p>"]}, "correct_response": ["d"], "section": "", "question_plain": "Which is not a library used to visualize data in Python?", "related_lectures": [{"_class": "lecture", "id": 33233816, "title": "Saving Plots & Further Exploration", "created": "2022-07-25T12:58:00Z", "is_published": true, "asset": {"_class": "asset", "id": 42845224, "asset_type": "Video", "title": "S5L24_Saving_Plots_and_More_Libraries_V2.mp4", "created": "2022-08-02T20:15:39Z"}, "object_index": 160, "url": "/course/python-pandas/learn/lecture/33233816"}]}]};
      var correct = 0;
      var total = 0;
      const questionData = quizData.questions
      const passPercent = quizData.pass_percent

      function main() {
        total = questionData.length;

        var questions = [];
        for (var i = 0; i < questionData.length; i++) {
          var question = questionData[i];
          var questionText = question.prompt.question;
          var answers = question.prompt.answers;
          var correctAnswer = question.correct_response[0];
          var correctAnswerText = answers[correctAnswer.charCodeAt(0) - 97];
          var questionObj = {
            question: questionText,
            correctAnswer: correctAnswerText,
            answers: answers,
            id: question.id,
          };
          questions.push(questionObj);
        }

        updateScore();

        // display the questions
        var questionsContainer = document.getElementById("quiz-container");
        for (var i = 0; i < questions.length; i++) {
          var question = questions[i];
          var questionElement = document.createElement("form");
          questionElement.className = "question";
          questionElement.innerHTML =
            "<span>Question " +
            (i + 1) +
            ":</span>" +
            '<div class="question-prompt">' +
            question.question +
            "</div>";
          questionElement.id = question.id;
          questionElement.classList.add("quiz-container");
          var answersElement = document.createElement("ul");
          answersElement.className = "answers";
          for (var j = 0; j < question.answers.length; j++) {
            var answer = question.answers[j];
            var answerElement = document.createElement("li");
            answerElement.className = "answer";
            answerElement.innerHTML =
              '<label for="input-' +
              question.id +
              "-" +
              j +
              '"><div onclick="select(' +
              question.id +
              ", " +
              j +
              ')"><span></span><input id="input-' +
              question.id +
              "-" +
              j +
              '" type="radio" name="question' +
              i +
              '" value="' +
              j +
              '">' +
              answer +
              "</input></div></label>";
            answerElement.classList.add("question-answer");
            answersElement.appendChild(answerElement);
          }

          questionElement.appendChild(answersElement);

          // add a submit button
          var submitButton = document.createElement("button");
          submitButton.className = "submit";
          submitButton.innerHTML = "Submit";
          submitButton.classList.add("submit-button");

          submitButton.addEventListener("click", function (e) {
            e.preventDefault();
            var questionElement = e.target.parentElement;
            var questionId = questionElement.id;
            var question = questions.filter(function (q) {
              return q.id == questionId;
            })[0];

            // set the border color of all answers to black
            var answers = questionElement.getElementsByClassName("answer");
            for (var i = 0; i < answers.length; i++) {
              console.log(answers[i]);
              answers[i].children[0].style.borderColor = "#1c1d1f";
            }

            var answer = questionElement.querySelector(
              'input[type="radio"]:checked'
            );
            if (answer) {
              var answerIndex = answer.value;
              var answerText = question.answers[answerIndex];
              if (answerText == question.correctAnswer) {
                answer.parentElement.parentElement.style.borderColor =
                  "limegreen";
                // alert("Correct!");
                correct++;
                updateScore();
              } else {
                answer.parentElement.parentElement.style.borderColor = "red";
                // alert("Incorrect!");
              }
            } else {
              alert("Please select an answer.");
            }
          });

          // add button
          questionElement.appendChild(submitButton);

          questionsContainer.appendChild(questionElement);
        }
      }

      function select(question, answer) {
        var questionElement = document.getElementById(question);
        var answers = questionElement.getElementsByClassName("answer");
        for (var i = 0; i < answers.length; i++) {
          var span = answers[i].children[0].children[0].children[0];
          var input = answers[i].children[0].children[0].children[1];
          span.classList.remove("selected");
          input.checked = false;
        }
        var span = answers[answer].children[0].children[0].children[0];
        var input = answers[answer].children[0].children[0].children[1];
        span.classList.add("selected");
        input.checked = true;
      }

      function updateScore() {
        var scoreElem = document.getElementById("score");
        const score = (correct / total) * 100;
        scoreElem.innerHTML = "Score: " + score + "/" + passPercent + "%";
      }
    </script>
  </body>
