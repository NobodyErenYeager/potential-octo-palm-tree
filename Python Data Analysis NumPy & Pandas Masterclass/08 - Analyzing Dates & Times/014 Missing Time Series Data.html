  <body onload="main()">

    <script>
      const quizData = {"title": "014 Missing Time Series Data", "hasInstructions": true, "hasTests": true, "hasSolutions": true, "instructions": "<ol><li><p><strong>Load the Dataset</strong>: Import the <strong>cryptocurrency_BTC_missing.csv</strong> file which includes missing values in the 'Close' column.</p></li><li><p><strong>Fill Missing Data</strong>: Use the median of the 'Close' column to fill any missing values. Perform this operation in a single line to keep your code clean and efficient.</p></li><li><p><strong>Review the Data</strong>: Print the updated DataFrame to check that all missing values in the 'Close' column have been appropriately filled</p></li></ol>", "tests": [{"file_name": "evaluate.py", "content": "import unittest\r\nimport pandas as pd\r\n\r\nclass TestHandleMissingData(unittest.TestCase):\r\n    def test_fill_median(self):\r\n        data = {\r\n            'Close': [19785, 23337, None, 19432, 20496, None, 16547, 23139, 23147, None, 29269, 27220, 30477, 29230, 25931, 26968, 34668, 37713, None, 42583, 61198, 71334, 60637, 62335]\r\n        }\r\n        df = pd.DataFrame(data)\r\n        # Calculate median ignoring NaNs\r\n        calculated_median = df['Close'].median()\r\n        self.assertEqual(calculated_median, 28225)  # Asserting median is as stated\r\n\r\n        # Fill NaNs with the calculated median\r\n        df['Close'] = df['Close'].fillna(calculated_median)\r\n        # Ensure no NaN values remain and that filled values are correct\r\n        self.assertFalse(df['Close'].isnull().any())\r\n        self.assertTrue((df['Close'] == 28225).sum() > 0)  # Checking if NaNs are replaced by the median\r\n\r\n# Run the tests\r\nif __name__ == '__main__':\r\n    unittest.main()\r\n"}], "solutions": [{"file_name": "exercise.py", "content": "import pandas as pd\r\n\r\n# Load the dataset with missing 'Close' prices\r\ncrypto = pd.read_csv(\"cryptocurrency_BTC_missing.csv\", parse_dates=['Date'])\r\n\r\n# Calculate and fill missing 'Close' values using the median in one line\r\ncrypto['Close'] = crypto['Close'].fillna(crypto['Close'].median())\r\n\r\n# Display the entire DataFrame after filling missing values\r\nprint(crypto)\r\n"}, {"file_name": "cryptocurrency_BTC_missing.csv", "content": "Date\t  Ticker  Open\t\t  High       Low        Close     Adj Close\t     Volume                   \r\n01/06/2022\tBTC\t 31,793 \t 31,957 \t 17,709 \t 19,785 \t 19,785 \t 923,939,211,678 \r\n01/07/2022\tBTC\t 19,820 \t 24,573 \t 18,967 \t 23,337 \t 23,337 \t 927,582,363,389 \r\n01/08/2022\tBTC\t 23,337 \t 25,136 \t 19,601 \t NaN \t     20,050 \t 894,192,654,543 \r\n01/09/2022\tBTC\t 20,050 \t 22,674 \t 18,290 \t 19,432 \t 19,432 \t 1,123,272,250,385 \r\n01/10/2022\tBTC\t 19,431 \t 20,988 \t 18,320 \t 20,496 \t 20,496 \t 957,903,424,925 \r\n01/11/2022\tBTC\t 20,495 \t 21,447 \t 15,599 \t NaN \t     17,169 \t 1,224,531,549,126 \r\n01/12/2022\tBTC\t 17,168 \t 18,319 \t 16,398 \t 16,547 \t 16,547 \t 541,356,716,034 \r\n01/01/2023\tBTC\t 16,548 \t 23,920 \t 16,521 \t 23,139 \t 23,139 \t 690,994,018,045 \r\n01/02/2023\tBTC\t 23,138 \t 25,134 \t 21,460 \t 23,147 \t 23,147 \t 723,968,574,897 \r\n01/03/2023\tBTC\t 23,151 \t 29,160 \t 19,628 \t NaN \t     28,478 \t 883,299,703,608 \r\n01/04/2023\tBTC\t 28,473 \t 31,006 \t 27,071 \t 29,269 \t 29,269 \t 511,540,319,004 \r\n01/05/2023\tBTC\t 29,227 \t 29,820 \t 25,878 \t 27,220 \t 27,220 \t 443,473,015,479 \r\n01/06/2023\tBTC\t 27,218 \t 31,390 \t 24,797 \t 30,477 \t 30,477 \t 481,734,214,225 \r\n01/07/2023\tBTC\t 30,472 \t 31,815 \t 28,934 \t 29,230 \t 29,230 \t 382,224,489,090 \r\n01/08/2023\tBTC\t 29,231 \t 30,177 \t 25,409 \t 25,931 \t 25,931 \t 437,724,169,499 \r\n01/09/2023\tBTC\t 25,934 \t 27,489 \t 24,930 \t 26,968 \t 26,968 \t 337,637,313,742 \r\n01/10/2023\tBTC\t 26,967 \t 35,150 \t 26,558 \t 34,668 \t 34,668 \t 476,425,634,860 \r\n01/11/2023\tBTC\t 34,657 \t 38,415 \t 34,133 \t 37,713 \t 37,713 \t 570,863,267,380 \r\n01/12/2023\tBTC\t 37,718 \t 44,706 \t 37,629 \t NaN \t     42,265 \t 721,704,910,480 \r\n01/01/2024\tBTC\t 42,280 \t 48,969 \t 38,522 \t 42,583 \t 42,583 \t 825,918,941,347 \r\n01/02/2024\tBTC\t 42,570 \t 63,913 \t 41,879 \t 61,198 \t 61,198 \t 830,721,862,621 \r\n01/03/2024\tBTC\t 61,168 \t 73,750 \t 59,324 \t 71,334 \t 71,334 \t 1,446,417,844,950 \r\n01/04/2024\tBTC\t 71,333 \t 72,715 \t 59,120 \t 60,637 \t 60,637 \t 1,016,068,331,704 \r\n01/05/2024\tBTC\t 60,609 \t 65,495 \t 56,555 \t 62,335 \t 62,335 \t 207,868,919,354 "}]};

      function renderCodeList(rootElement, codeList, className, titlePrefix) {
        for (var i = 0; i < codeList.length; i++) {
          var elem = codeList[i];
          var jsElem = document.createElement("div");
          jsElem.className = className;
          var jsElemTitle = document.createElement("h3");
          jsElemTitle.innerHTML = titlePrefix + " " + (i + 1);
          var jsElemBody = document.createElement("code");
          jsElemBody.className = "code-block black-block";
          jsElemBody.innerHTML = "<pre>" + elem.content + "</pre>";
          jsElem.appendChild(jsElemTitle);
          jsElem.appendChild(jsElemBody);
          rootElement.appendChild(jsElem);
        }
      }
      
      function main() {
        // display the assignment
        var codingTitle = document.getElementById("coding-title");
        codingTitle.innerHTML = quizData.title;
        
        var codingInstructions = document.getElementById("coding-instructions");
        if (quizData.hasInstructions) {
          codingInstructions.innerHTML = quizData.instructions;
        } else {
          codingInstructions.innerHTML = "<span class=\"italic-text\">" + quizData.instructions
            + "</span>";
        }

        // display the test(s)
        var codingTests = document.getElementById("coding-tests");
        if (!quizData.hasTests) {
          codingTests.innerHTML = "<span class=\"italic-text\">" + quizData.tests + "</span>";
        } else {
          renderCodeList(codingTests, quizData.tests, "coding-test", "Test");
        }
        

        // display the solution(s)
        var codingSolutions = document.getElementById("coding-solutions");
        if (!quizData.hasSolutions) {
          codingSolutions.innerHTML = "<span class=\"italic-text\">" + quizData.solutions + "</span>";
        } else {
          renderCodeList(codingSolutions, quizData.solutions, "coding-solution", "Solution");
        }
      }
    </script>
