<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Coding Assignment</title>

    <style>
      body {
        font-family: sf pro text, -apple-system, BlinkMacSystemFont, Roboto,
          segoe ui, Helvetica, Arial, sans-serif, apple color emoji,
          segoe ui emoji, segoe ui symbol;
        font-weight: 400;
        line-height: 22.4px;
        font-size: 16px;
      }
      p, ul, ol {
        font-size: 16px;
        font-weight: 400;
      }
      h1, h2, h3, h4, h5, h6 {
        font-weight: bold;
      }
      ul {
        list-style: none;
        margin: 0;
        padding: 0;
        max-width: none;
      }
      .code-snippet {
        background-color: #fff;
        border: 1px solid #d1d7dc;
        color: #b4690e;
        font-size: 90%;
        padding: 0.2rem 0.4rem;
      }
      .code-block {
        background-color: #fff;
        color: #b4690e;
        font-size: 90%;
      }
      .black-block {
        color: #000000;
      }
      .italic-text {
        font-style: italic;
      }
    </style>
  </head>

  <body onload="main()">
    <h1 id="coding-title"></h1>
    <div>
      <h2>Instructions</h2>
      <div id="coding-instructions"></div>
    </div>
    <div>
      <h2>Test(s)</h2>
      <div id="coding-tests"></div>
    </div>
    <div>
      <h2>Solution(s)</h2>
      <div id="coding-solutions"></div>
    </div>

    <script>
      const quizData = {"title": "055 Downcasting Numeric Data Types", "hasInstructions": true, "hasTests": true, "hasSolutions": true, "instructions": "<ol><li><p><strong>Load the Dataset</strong>: Begin by loading the data from \"insurance_data.csv\".</p></li><li><p><strong>Downcast Numerical Columns</strong>: Apply the <strong>astype()</strong> method to downcast the data types of the numerical columns:</p><ul><li><p>'age' and 'children' to <strong>int8</strong>.</p></li><li><p>'bmi' and 'charges' to <strong>float32</strong>.</p></li></ul></li><li><p><strong>Compare Memory Usage</strong>: Display the memory usage of the DataFrame before and after downcasting to evaluate the impact.</p></li></ol>", "tests": [{"file_name": "evaluate.py", "content": "from unittest import TestCase\r\nimport pandas as pd\r\nimport exercise\r\n\r\nclass TestDowncasting(TestCase):\r\n    def test_downcasting_data_types(self):\r\n        # Load the original dataset\r\n        df = pd.read_csv(\"insurance_data.csv\")\r\n\r\n        # Expected data types after downcasting\r\n        expected_dtypes = {\r\n            'age': 'int8',\r\n            'bmi': 'float32',\r\n            'children': 'int8',\r\n            'charges': 'float32'\r\n        }\r\n\r\n        # Check if the downcasted DataFrame data types match the expected data types\r\n        for column, dtype in expected_dtypes.items():\r\n            self.assertTrue(exercise.df_downcasted[column].dtype == dtype, \r\n                            f\"Data type for {column} did not match. Expected {dtype}, got {exercise.df_downcasted[column].dtype}\")\r\n\r\n        # Check if the memory usage of the downcasted DataFrame is less than the original DataFrame\r\n        original_memory = df.memory_usage(deep=True).sum()\r\n        downcasted_memory = exercise.df_downcasted.memory_usage(deep=True).sum()\r\n        self.assertTrue(downcasted_memory < original_memory, \"Downcasting did not reduce memory usage.\")\r\n\r\n        # Optionally, print out memory usage for visual confirmation in a test scenario\r\n        print(\"Original memory usage:\", original_memory)\r\n        print(\"Downcasted memory usage:\", downcasted_memory)\r\n"}], "solutions": [{"file_name": "exercise.py", "content": "import pandas as pd\r\n\r\n# Load the dataset\r\ndf = pd.read_csv(\"insurance_data.csv\")\r\n\r\n# Downcast numerical columns to more memory-efficient types\r\ndf_downcasted = df.astype({\r\n    'age': 'int8',\r\n    'bmi': 'float32',\r\n    'children': 'int8',\r\n    'charges': 'float32'\r\n})\r\n\r\n# Display the memory usage before and after downcasting\r\nprint(\"Original DataFrame memory usage:\")\r\nprint(df.info(memory_usage=\"deep\"))\r\nprint(\"Downcasted DataFrame memory usage:\")\r\nprint(df_downcasted.info(memory_usage=\"deep\"))\r\n"}, {"file_name": "insurance_data.csv", "content": "age,sex,bmi,children,smoker,region,charges\r\n19,female,27.9,0,yes,southwest,16884.924\r\n18,male,33.77,1,no,southeast,1725.5523\r\n28,male,33,3,no,southeast,4449.462\r\n33,male,22.705,0,no,northwest,21984.47061\r\n32,male,28.88,0,no,northwest,3866.8552\r\n31,female,25.74,0,no,southeast,3756.6216\r\n46,female,33.44,1,no,southeast,8240.5896\r\n37,female,27.74,3,no,northwest,7281.5056\r\n37,male,29.83,2,no,northeast,6406.4107\r\n60,female,25.84,0,no,northwest,28923.13692\r\n25,male,26.22,0,no,northeast,2721.3208\r\n62,female,26.29,0,yes,southeast,27808.7251\r\n23,male,34.4,0,no,southwest,1826.843\r\n56,female,39.82,0,no,southeast,11090.7178\r\n27,male,42.13,0,yes,southeast,39611.7577\r\n19,male,24.6,1,no,southwest,1837.237\r\n52,female,30.78,1,no,northeast,10797.3362\r\n23,male,23.845,0,no,northeast,2395.17155\r\n56,male,40.3,0,no,southwest,10602.385\r\n"}]};

      function renderCodeList(rootElement, codeList, className, titlePrefix) {
        for (var i = 0; i < codeList.length; i++) {
          var elem = codeList[i];
          var jsElem = document.createElement("div");
          jsElem.className = className;
          var jsElemTitle = document.createElement("h3");
          jsElemTitle.innerHTML = titlePrefix + " " + (i + 1);
          var jsElemBody = document.createElement("code");
          jsElemBody.className = "code-block black-block";
          jsElemBody.innerHTML = "<pre>" + elem.content + "</pre>";
          jsElem.appendChild(jsElemTitle);
          jsElem.appendChild(jsElemBody);
          rootElement.appendChild(jsElem);
        }
      }
      
      function main() {
        // display the assignment
        var codingTitle = document.getElementById("coding-title");
        codingTitle.innerHTML = quizData.title;
        
        var codingInstructions = document.getElementById("coding-instructions");
        if (quizData.hasInstructions) {
          codingInstructions.innerHTML = quizData.instructions;
        } else {
          codingInstructions.innerHTML = "<span class=\"italic-text\">" + quizData.instructions
            + "</span>";
        }

        // display the test(s)
        var codingTests = document.getElementById("coding-tests");
        if (!quizData.hasTests) {
          codingTests.innerHTML = "<span class=\"italic-text\">" + quizData.tests + "</span>";
        } else {
          renderCodeList(codingTests, quizData.tests, "coding-test", "Test");
        }
        

        // display the solution(s)
        var codingSolutions = document.getElementById("coding-solutions");
        if (!quizData.hasSolutions) {
          codingSolutions.innerHTML = "<span class=\"italic-text\">" + quizData.solutions + "</span>";
        } else {
          renderCodeList(codingSolutions, quizData.solutions, "coding-solution", "Solution");
        }
      }
    </script>
  </body>
</html>
