<!DOCTYPE html>
<html lang="en">
  <head>

    <style>
      body {

      }
      p,
      h1,
      h2,
      h3,
      h4,
      h5,
      h6,
      ul,
      ol {
        font-size: 16px;
        font-weight: 400;
      }
      ul {
        list-style: none;
        margin: 0;
        padding: 0;
        max-width: none;
      }
      code {
        background-color: #fff;
        border: 1px solid #d1d7dc;
        color: #b4690e;
        font-size: 90%;
        padding: 0.2rem 0.4rem;
      }
      .quiz-content {
        padding: 2.4rem;
        word-break: break-word;
        max-width: 86rem;
        margin: 0 auto;
      }
      .quiz-container {
        margin: 0 auto;
        max-width: 84rem;
        padding: 0;
      }
      .question {
        margin-bottom: 5rem;
      }

        font-size: 24px;
        font-weight: 700;
      }
      .question-prompt {
        margin-top: 0.8rem;
        font-weight: 700;
      }
      .question-answer {
        margin-top: 1.6rem;
        padding-left: 0;
        box-sizing: border-box;
      }
      .question-answer label {
        max-width: 80rem;
        position: relative;
        cursor: pointer;
        display: flex;
        min-width: 18rem;
        border: solid #1c1d1f 2px;
      }
      .question-answer div {
        display: flex;
        align-items: center;
        padding: 0.5rem;
        width: 100%;
      }
      .question-answer div:hover {
        background-color: #f5f5f5;
      }
      .question-answer input {
        display: none;
      }
      .question-answer span {
        width: 1rem;
        height: 1rem;
        margin-right: 1.6rem;
        top: 0;
        border-radius: 50%;
        display: inline-block;
        flex-shrink: 0;
        border: 0.2rem solid #1c1d1f;
        position: relative;
      }
      .selected {
        background: #1c1d1f;
        box-shadow: 0 0 0 0.4rem #fff inset;
      }
      .score {
              position: fixed;
            }
    </style>
  </head>

  <body onload="main()">
    <div id="score" class="score">

    <script>
      const quizData = {"pass_percent": 70, "questions": [{"_class": "assessment", "id": 49355080, "assessment_type": "multiple-choice", "prompt": {"question": "<p>Which method will return information on the properties of a dataframe?</p>", "relatedLectureIds": ["33187498"], "feedbacks": ["", "", "The .info() method will return information on the properties of a series like shape, column datatypes, and more.", ""], "answers": ["<p>.metadata()</p>", "<p>.describe()</p>", "<p>.info()</p>", "<p>.properties()</p>"]}, "correct_response": ["c"], "section": "", "question_plain": "Which method will return information on the properties of a dataframe?", "related_lectures": [{"_class": "lecture", "id": 33187498, "title": "Exploring DataFrames: Info & Describe", "created": "2022-07-21T20:51:10Z", "is_published": true, "asset": {"_class": "asset", "id": 42775578, "asset_type": "Video", "title": "S3L6_Info_and_Describe_V2.mp4", "created": "2022-07-30T02:57:26Z"}, "object_index": 72, "url": "/course/python-pandas/learn/lecture/33187498"}]}, {"_class": "assessment", "id": 49355166, "assessment_type": "multiple-choice", "prompt": {"question": "<p>What is the difference between dropping data 'in place' vs. dropping data 'not in place'?</p>", "relatedLectureIds": ["33187512"], "feedbacks": ["", "", "", "Dropping data in place does not return a DataFrame, as it modifies the DataFrame it is called on. It can be risky to drop data in place if we're just testing out dropping rows or columns."], "answers": ["<p>Dropping data in place modifies the underlying DataFrame, while dropping data not in place does not modify the DataFrame object</p>", "<p>Dropping data in place does not return a DataFrame</p>", "<p>Dropping data in place is risky if we're not confident about dropping data</p>", "<p>All of the above</p>"]}, "correct_response": ["d"], "section": "", "question_plain": "What is the difference between dropping data 'in place' vs. dropping data 'not in place'?", "related_lectures": [{"_ ure", "id": 33187526, "title": "Filtering DataFrames", "created": "2022-07-21T20:52:33Z", "is_published": true, "asset": {"_class": "asset", "id": 42775742, "asset_type": "Video", "title": "S3L20_Filtering_DataFrames_V2.mp4", "created": "2022-07-30T03:14:50Z"}, "object_index": 86, "url": "/course/python-pandas/learn/lecture/33187526"}]}, {"_class": "assessment", "id": 49355182, "assessment_type": "multiple-choice", "prompt": {"question": "<p>Which method allows us to filter DataFrames using strings?</p>", "relatedLectureIds": ["33187528"], "feedbacks": ["", "", "", "The .query() method allows us to filter a dataframe using an SQL like syntax."], "answers": ["<p>.filter()</p>", "<p>.select()</p>", "<p>.where()</p>", "<p>.query()</p>"]}, "correct_response": ["d"], "section": "", "question_plain": "Which method allows us to filter DataFrames using strings?", "related_lectures": [{"_class": "lecture", "id": 33187528, "title": "PRO TIP: The Query Method", "created": "2022-07-21T20:52:39Z", "is_published": true, "asset": {"_class": "asset", "id": 42775762, "asset_type": "Video", "title": "S3L21_Query_V2.mp4", "created": "2022-07-30T03:16:25Z"}, "object_index": 87, "url": "/course/python-pandas/learn/lecture/33187528"}]}, {"_class": "assessment", "id": 49355186, "assessment_type": "multiple-choice", "prompt": {"question": "<p>Which of the following arguments in sort_values() will allow us to sort in reverse order?</p>", "relatedLectureIds": ["33187538"], "feedbacks": ["By default, sort_values() sorts values in ascending order. To sort in descending order, specify ascending=False.", "", "", ""], "answers": ["<p>ascending=False</p>", "<p>ascending=True</p>", "<p>reverse=True</p>", "<p>reverse=False</p>"]}, "correct_response": ["a"], "section": "", "question_plain": "Which of the following arguments in sort_values() will allow us to sort in reverse order?", "related_lectures": [{"_class": "lecture", "id": 33187538, "title": "Sorting DataFrames", "created": "2022-07-21T20:52:58Z", "is_published": true, "asset": {"_class": "asset", "id": 42775802, "asset_type": "Video", "title": "S3L24_Sorting_DataFrames_V2.mp4", "created": "2022-07-30T03:19:56Z"}, "object_index": 90, "url": "/course/python-pandas/learn/lecture/33187538"}]}, {"_class": "assessment", "id": 49355316, "assessment_type": "multiple-choice", "prompt": {"question": "<p>Which of the following would sort a DataFrame's columns in alphabetical order?</p>", "relatedLectureIds": ["33187538"], "feedbacks": ["", "Sorting a dataframe by axis=1 will sort its columns in alphabetical order.", "", ""], "answers": ["<p>df.sort_index()</p>", "<p>df.sort_index(axis=1)</p>", "<p>df.sort_values(by=\"index\")</p>", "<p>df.sort_values(by=\"index\", axis=1)</p>"]}, "correct_response": ["b"], "section": "", "question_plain": "Which of the following would sort a DataFrame's columns in alphabetical order?", "related_lectures": [{"_class": "lecture", "id": 33187538, "title": "Sorting DataFrames", "created": "2022-07-21T20:52:58Z", "is_published": true, "asset": {"_class": "asset", "id": 42775802, "asset_type": "Video", "title": "S3L24_Sorting_DataFrames_V2.mp4", "created": "2022-07-30T03:19:56Z"}, "object_index": 90, "url": "/course/python-pandas/learn/lecture/33187538"}]}, {"_class": "assessment", "id": 49355322, "assessment_type": "multiple-choice", "prompt": {"question": "<p>Which of the following methods allows the user to specify the order of columns in a DataFrame?</p>", "relatedLectureIds": ["33187544"], "feedbacks": ["", "", "", "The reindex method allows the user to specify the order of values in an index. Specifying axis=1 instructs the method to operate on the column index."], "answers": ["<p>reorder()</p>", "<p>reorder(axis=1)</p>", "<p>reindex()</p>", "<p>reindex(axis=1)</p>"]}, "correct_response": ["d"], "section": "", "question_plain": "Which of the following methods allows the user to specify the order of columns in a DataFrame?", "related_lectures": [{"_class": "lecture", "id": 33187544, "title": "Renaming & Reordering Columns", "created": "2022-07-21T20:53:16Z", "is_published": true, "asset": {"_class": "asset", "id": 42775760, "asset_type": "Video", "title": "S3L27_Renaming & Reording Columns_V2.mp4", "created": "2022-07-30T03:15:37Z"}, "object_index": 93, "url": "/course/python-pandas/learn/lecture/33187544"}]}, {"_class": "assessment", "id": 49355328, "assessment_type": "multiple-choice", "prompt": {"question": "<p>Which method allows us to create multiple DataFrame columns?</p>", "relatedLectureIds": ["33187566"], "feedbacks": [".assign() allows us to create multiple columns in a single step.", "", "", ""], "answers": ["<p>.assign()</p>", "<p>.create()</p>", "<p>.columns()</p>", "<p>.new_cols()</p>"]}, "correct_response": ["a"], "section": "", "question_plain": "Which method allows us to create multiple DataFrame columns?", "related_lectures": [{"_class": "lecture", "id": 33187566, "title": "PRO TIP: Multiple Column Creation with Assign", "created": "2022-07-21T20:54:20Z", "is_published": true, "asset": {"_class": "asset", "id": 42775830, "asset_type": "Video", "title": "S3L37_Assign_V2.mp4", "created": "2022-07-30T03:23:31Z"}, "object_index": 103, "url": "/course/python-pandas/learn/lecture/33187566"}]}, {"_class": "assessment", "id": 49355458, "assessment_type": "multiple-choice", "prompt": {"question": "<p>Which data type should an integer with a maximum value of 15 be cast to for optimal memory use?</p>", "relatedLectureIds": ["33187582"], "feedbacks": ["Int8 has a range from -32 to 32, so should be used for this column.", "", "", ""], "answers": ["<p>Int8</p>", "<p>Int16</p>", "<p>Int32</p>", "<p>Int64</p>"]}, "correct_response": ["a"], "section": "", "question_plain": "Which data type should an integer with a maximum value of 15 be cast to for optimal memory use?", "related_lectures": [{"_class": "lecture", "id": 33187582, "title": "PRO TIP: Downcasting Numeric Data Types", "created": "2022-07-21T20:54:54Z", "is_published": true, "asset": {"_class": "asset", "id": 42826202, "asset_type": "Video", "title": "S3L43_Downcasting_Numerics_V2.mp4", "created": "2022-08-01T23:26:14Z"}, "object_index": 109, "url": "/course/python-pandas/learn/lecture/33187582"}]}]};
      var correct = 0;
      var total = 0;
      const questionData = quizData.questions
      const passPercent = quizData.pass_percent

      function main() {
        total = questionData.length;

        var questions = [];
        for (var i = 0; i < questionData.length; i++) {
          var question = questionData[i];
          var questionText = question.prompt.question;
          var answers = question.prompt.answers;
          var correctAnswer = question.correct_response[0];
          var correctAnswerText = answers[correctAnswer.charCodeAt(0) - 97];
          var questionObj = {
            question: questionText,
            correctAnswer: correctAnswerText,
            answers: answers,
            id: question.id,
          };
          questions.push(questionObj);
        }

        updateScore();

        // display the questions
        var questionsContainer = document.getElementById("quiz-container");
        for (var i = 0; i < questions.length; i++) {
          var question = questions[i];
          var questionElement = document.createElement("form");
          questionElement.className = "question";
          questionElement.innerHTML =
            "<span>Question " +
            (i + 1) +
            ":</span>" +
            '<div class="question-prompt">' +
            question.question +
            "</div>";
          questionElement.id = question.id;
          questionElement.classList.add("quiz-container");
          var answersElement = document.createElement("ul");
          answersElement.className = "answers";
          for (var j = 0; j < question.answers.length; j++) {
            var answer = question.answers[j];
            var answerElement = document.createElement("li");
            answerElement.className = "answer";
            answerElement.innerHTML =
              '<label for="input-' +
              question.id +
              "-" +
              j +
              '"><div onclick="select(' +
              question.id +
              ", " +
              j +
              ')"><span></span><input id="input-' +
              question.id +
              "-" +
              j +
              '" type="radio" name="question' +
              i +
              '" value="' +
              j +
              '">' +
              answer +
              "</input></div></label>";
            answerElement.classList.add("question-answer");
            answersElement.appendChild(answerElement);
          }

          questionElement.appendChild(answersElement);

          // add a submit button
          var submitButton = document.createElement("button");
          submitButton.className = "submit";
          submitButton.innerHTML = "Submit";
          submitButton.classList.add("submit-button");

          submitButton.addEventListener("click", function (e) {
            e.preventDefault();
            var questionElement = e.target.parentElement;
            var questionId = questionElement.id;
            var question = questions.filter(function (q) {
              return q.id == questionId;
            })[0];

            // set the border color of all answers to black
            var answers = questionElement.getElementsByClassName("answer");
            for (var i = 0; i < answers.length; i++) {
              console.log(answers[i]);
              answers[i].children[0].style.borderColor = "#1c1d1f";
            }

            var answer = questionElement.querySelector(
              'input[type="radio"]:checked'
            );
            if (answer) {
              var answerIndex = answer.value;
              var answerText = question.answers[answerIndex];
              if (answerText == question.correctAnswer) {
                answer.parentElement.parentElement.style.borderColor =
                  "limegreen";
                // alert("Correct!");
                correct++;
                updateScore();
              } else {
                answer.parentElement.parentElement.style.borderColor = "red";
                // alert("Incorrect!");
              }
            } else {
              alert("Please select an answer.");
            }
          });

          // add button
          questionElement.appendChild(submitButton);

          questionsContainer.appendChild(questionElement);
        }
      }

      function select(question, answer) {
        var questionElement = document.getElementById(question);
        var answers = questionElement.getElementsByClassName("answer");
        for (var i = 0; i < answers.length; i++) {
          var span = answers[i].children[0].children[0].children[0];
          var input = answers[i].children[0].children[0].children[1];
          span.classList.remove("selected");
          input.checked = false;
        }
        var span = answers[answer].children[0].children[0].children[0];
        var input = answers[answer].children[0].children[0].children[1];
        span.classList.add("selected");
        input.checked = true;
      }

      function updateScore() {
        var scoreElem = document.getElementById("score");
        const score = (correct / total) * 100;
        scoreElem.innerHTML = "Score: " + score + "/" + passPercent + "%";
      }
    </script>
  </body>
