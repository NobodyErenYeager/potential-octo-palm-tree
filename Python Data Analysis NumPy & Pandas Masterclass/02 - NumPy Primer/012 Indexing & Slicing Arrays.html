<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Coding Assignment</title>

    <style>
      body {
        font-family: sf pro text, -apple-system, BlinkMacSystemFont, Roboto,
          segoe ui, Helvetica, Arial, sans-serif, apple color emoji,
          segoe ui emoji, segoe ui symbol;
        font-weight: 400;
        line-height: 22.4px;
        font-size: 16px;
      }
      p, ul, ol {
        font-size: 16px;
        font-weight: 400;
      }
      h1, h2, h3, h4, h5, h6 {
        font-weight: bold;
      }
      ul {
        list-style: none;
        margin: 0;
        padding: 0;
        max-width: none;
      }
      .code-snippet {
        background-color: #fff;
        border: 1px solid #d1d7dc;
        color: #b4690e;
        font-size: 90%;
        padding: 0.2rem 0.4rem;
      }
      .code-block {
        background-color: #fff;
        color: #b4690e;
        font-size: 90%;
      }
      .black-block {
        color: #000000;
      }
      .italic-text {
        font-style: italic;
      }
    </style>
  </head>

  <body onload="main()">
    <h1 id="coding-title"></h1>
    <div>
      <h2>Instructions</h2>
      <div id="coding-instructions"></div>
    </div>
    <div>
      <h2>Test(s)</h2>
      <div id="coding-tests"></div>
    </div>
    <div>
      <h2>Solution(s)</h2>
      <div id="coding-solutions"></div>
    </div>

    <script>
      const quizData = {"title": "012 Indexing & Slicing Arrays", "hasInstructions": true, "hasTests": true, "hasSolutions": true, "instructions": "<p>You have been provided with a one-dimensional NumPy array named \"ages\" representing the ages of people in a small community. Your task is to extract specific age groups from this array using slicing. Perform the following operations and store the results in separate variables:<br><br><strong>Youth Ages:</strong> Extract ages from 10 to 19 years inclusive and store them in a variable named <strong>youth_ages</strong>.</p><p><strong>Adult Ages:</strong> Extract ages from 20 to 65 years inclusive and store them in a variable named <strong>adult_ages</strong>.</p><p><strong>Senior Ages:</strong> Extract all ages 70 and above and store them in a variable named <strong>senior_ages</strong>.</p>", "tests": [{"file_name": "evaluate.py", "content": "from unittest import TestCase\nimport numpy as np\n\nclass Evaluate(TestCase):\n    def setUp(self):\n        # Setup a known array of ages for testing\n        self.ages = np.array([5, 10, 15, 19, 20, 25, 30, 35, 40, 45, 50, 55, 60, 65, 70, 75, 80])\n\n    def test_exercise(self):\n        import exercise\n\n        # Ensure the exercise script has defined the required variables\n        self.assertTrue(hasattr(exercise, 'youth_ages'), \"youth_ages has not been defined\")\n        self.assertTrue(hasattr(exercise, 'adult_ages'), \"adult_ages has not been defined\")\n        self.assertTrue(hasattr(exercise, 'senior_ages'), \"senior_ages has not been defined\")\n\n        # Check if the correct slicing was used\n        np.testing.assert_array_equal(exercise.youth_ages, self.ages[1:4], \"youth_ages does not contain the correct ages\")\n        np.testing.assert_array_equal(exercise.adult_ages, self.ages[4:14], \"adult_ages does not contain the correct ages\")\n        np.testing.assert_array_equal(exercise.senior_ages, self.ages[14:], \"senior_ages does not contain the correct ages\")"}], "solutions": [{"file_name": "exercise.py", "content": "import numpy as np\r\n\r\nages = np.array([5, 10, 15, 19, 20, 25, 30, 35, 40, 45, 50, 55, 60, 65, 70, 75, 80])\r\n\r\nyouth_ages = ages[1:4] \r\nadult_ages = ages[4:14] \r\nsenior_ages = ages[14:] \r\n\r\nprint(\"Youth Ages:\", youth_ages)\r\nprint(\"Adult Ages:\", adult_ages)\r\nprint(\"Senior Ages:\", senior_ages)\r\n"}]};

      function renderCodeList(rootElement, codeList, className, titlePrefix) {
        for (var i = 0; i < codeList.length; i++) {
          var elem = codeList[i];
          var jsElem = document.createElement("div");
          jsElem.className = className;
          var jsElemTitle = document.createElement("h3");
          jsElemTitle.innerHTML = titlePrefix + " " + (i + 1);
          var jsElemBody = document.createElement("code");
          jsElemBody.className = "code-block black-block";
          jsElemBody.innerHTML = "<pre>" + elem.content + "</pre>";
          jsElem.appendChild(jsElemTitle);
          jsElem.appendChild(jsElemBody);
          rootElement.appendChild(jsElem);
        }
      }
      
      function main() {
        // display the assignment
        var codingTitle = document.getElementById("coding-title");
        codingTitle.innerHTML = quizData.title;
        
        var codingInstructions = document.getElementById("coding-instructions");
        if (quizData.hasInstructions) {
          codingInstructions.innerHTML = quizData.instructions;
        } else {
          codingInstructions.innerHTML = "<span class=\"italic-text\">" + quizData.instructions
            + "</span>";
        }

        // display the test(s)
        var codingTests = document.getElementById("coding-tests");
        if (!quizData.hasTests) {
          codingTests.innerHTML = "<span class=\"italic-text\">" + quizData.tests + "</span>";
        } else {
          renderCodeList(codingTests, quizData.tests, "coding-test", "Test");
        }
        

        // display the solution(s)
        var codingSolutions = document.getElementById("coding-solutions");
        if (!quizData.hasSolutions) {
          codingSolutions.innerHTML = "<span class=\"italic-text\">" + quizData.solutions + "</span>";
        } else {
          renderCodeList(codingSolutions, quizData.solutions, "coding-solution", "Solution");
        }
      }
    </script>
  </body>
</html>
