<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Coding Assignment</title>

    <style>
      body {
        font-family: sf pro text, -apple-system, BlinkMacSystemFont, Roboto,
          segoe ui, Helvetica, Arial, sans-serif, apple color emoji,
          segoe ui emoji, segoe ui symbol;
        font-weight: 400;
        line-height: 22.4px;
        font-size: 16px;
      }
      p, ul, ol {
        font-size: 16px;
        font-weight: 400;
      }
      h1, h2, h3, h4, h5, h6 {
        font-weight: bold;
      }
      ul {
        list-style: none;
        margin: 0;
        padding: 0;
        max-width: none;
      }
      .code-snippet {
        background-color: #fff;
        border: 1px solid #d1d7dc;
        color: #b4690e;
        font-size: 90%;
        padding: 0.2rem 0.4rem;
      }
      .code-block {
        background-color: #fff;
        color: #b4690e;
        font-size: 90%;
      }
      .black-block {
        color: #000000;
      }
      .italic-text {
        font-style: italic;
      }
    </style>
  </head>

  <body onload="main()">
    <h1 id="coding-title"></h1>
    <div>
      <h2>Instructions</h2>
      <div id="coding-instructions"></div>
    </div>
    <div>
      <h2>Test(s)</h2>
      <div id="coding-tests"></div>
    </div>
    <div>
      <h2>Solution(s)</h2>
      <div id="coding-solutions"></div>
    </div>

    <script>
      const quizData = {"title": "008 Random Number Generation", "hasInstructions": true, "hasTests": true, "hasSolutions": true, "instructions": "<p>Create an array random_ages that contains 100 random integers representing ages, with each age being between 1 and 100 years inclusive. </p><p>Use the default_rng() function from NumPy's random module to create a random generator with a seed value of 12345 for reproducibility.</p>", "tests": [{"file_name": "evaluate.py", "content": "from unittest import TestCase\r\nfrom numpy.random import default_rng\r\n\r\n\r\nclass Evaluate(TestCase):\r\n    def test_exercise(self):\r\n        import exercise\r\n        rg = default_rng(12345)\r\n        expected_array = rg.integers(1, 101, size=100)\r\n        student_array = exercise.random_ages\r\n        self.assertEqual(len(student_array), 100, \"The `random_ages` array must contain exactly 100 elements.\")\r\n        self.assertTrue(all(1 <= age <= 100 for age in student_array), \"All ages must be between 1 and 100 inclusive.\")\r\n        self.assertTrue((student_array >= 1).all() and (student_array < 101).all(), \"The `random_ages` array contains out of range values.\")\r\n        self.assertEqual(student_array.dtype, int, \"The `random_ages` array should only contain integers.\")\r\n        self.assertEqual(student_array.tolist(), expected_array.tolist(), \"The `random_ages` array should be randomised.\")\r\n"}], "solutions": [{"file_name": "exercise.py", "content": "import numpy as np\n\n# Initialise the random generator\nrg = np.random.default_rng(12345)\n\n# Generate an array of 100 random ages between 1 and 100\nrandom_ages = rg.integers(1, 101, size=100)\n\n# Output the array\nprint(random_ages)\n"}]};

      function renderCodeList(rootElement, codeList, className, titlePrefix) {
        for (var i = 0; i < codeList.length; i++) {
          var elem = codeList[i];
          var jsElem = document.createElement("div");
          jsElem.className = className;
          var jsElemTitle = document.createElement("h3");
          jsElemTitle.innerHTML = titlePrefix + " " + (i + 1);
          var jsElemBody = document.createElement("code");
          jsElemBody.className = "code-block black-block";
          jsElemBody.innerHTML = "<pre>" + elem.content + "</pre>";
          jsElem.appendChild(jsElemTitle);
          jsElem.appendChild(jsElemBody);
          rootElement.appendChild(jsElem);
        }
      }
      
      function main() {
        // display the assignment
        var codingTitle = document.getElementById("coding-title");
        codingTitle.innerHTML = quizData.title;
        
        var codingInstructions = document.getElementById("coding-instructions");
        if (quizData.hasInstructions) {
          codingInstructions.innerHTML = quizData.instructions;
        } else {
          codingInstructions.innerHTML = "<span class=\"italic-text\">" + quizData.instructions
            + "</span>";
        }

        // display the test(s)
        var codingTests = document.getElementById("coding-tests");
        if (!quizData.hasTests) {
          codingTests.innerHTML = "<span class=\"italic-text\">" + quizData.tests + "</span>";
        } else {
          renderCodeList(codingTests, quizData.tests, "coding-test", "Test");
        }
        

        // display the solution(s)
        var codingSolutions = document.getElementById("coding-solutions");
        if (!quizData.hasSolutions) {
          codingSolutions.innerHTML = "<span class=\"italic-text\">" + quizData.solutions + "</span>";
        } else {
          renderCodeList(codingSolutions, quizData.solutions, "coding-solution", "Solution");
        }
      }
    </script>
  </body>
</html>
