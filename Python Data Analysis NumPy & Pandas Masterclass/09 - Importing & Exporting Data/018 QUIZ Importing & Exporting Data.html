<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quiz</title>

    <style>
      body {
        font-family: sf pro text, -apple-system, BlinkMacSystemFont, Roboto,
          segoe ui, Helvetica, Arial, sans-serif, apple color emoji,
          segoe ui emoji, segoe ui symbol;
        font-weight: 400;
        line-height: 22.4px;
        font-size: 16px;
      }
      p,
      h1,
      h2,
      h3,
      h4,
      h5,
      h6,
      ul,
      ol {
        font-size: 16px;
        font-weight: 400;
      }
      ul {
        list-style: none;
        margin: 0;
        padding: 0;
        max-width: none;
      }
      code {
        background-color: #fff;
        border: 1px solid #d1d7dc;
        color: #b4690e;
        font-size: 90%;
        padding: 0.2rem 0.4rem;
      }
      .quiz-content {
        padding: 2.4rem;
        word-break: break-word;
        max-width: 86rem;
        margin: 0 auto;
      }
      .quiz-container {
        margin: 0 auto;
        max-width: 84rem;
        padding: 0;
      }
      .question {
        margin-bottom: 5rem;
      }
      .question span {
        font-size: 24px;
        font-weight: 700;
      }
      .question-prompt {
        margin-top: 0.8rem;
        font-weight: 700;
      }
      .question-answer {
        margin-top: 1.6rem;
        padding-left: 0;
        box-sizing: border-box;
      }
      .question-answer label {
        max-width: 80rem;
        position: relative;
        cursor: pointer;
        display: flex;
        min-width: 18rem;
        border: solid #1c1d1f 2px;
      }
      .question-answer div {
        display: flex;
        align-items: center;
        padding: 0.5rem;
        width: 100%;
      }
      .question-answer div:hover {
        background-color: #f5f5f5;
      }
      .question-answer input {
        display: none;
      }
      .question-answer span {
        width: 1rem;
        height: 1rem;
        margin-right: 1.6rem;
        top: 0;
        border-radius: 50%;
        display: inline-block;
        flex-shrink: 0;
        border: 0.2rem solid #1c1d1f;
        position: relative;
      }
      .selected {
        background: #1c1d1f;
        box-shadow: 0 0 0 0.4rem #fff inset;
      }
      .score {
              position: fixed;
            }
    </style>
  </head>

  <body onload="main()">
    <div id="score" class="score">
      <span>Score: N/A of N/A</span>
    </div>
    <div id="quiz-container" class="quiz-content"></div>

    <script>
      const quizData = {"pass_percent": 70, "questions": [{"_class": "assessment", "id": 49355808, "assessment_type": "multiple-choice", "prompt": {"question": "<p>Which argument allows us to specify a delimiter other than a comma when using pd.read_csv()?</p>", "relatedLectureIds": ["33233904"], "feedbacks": ["The sep= argument allows us to specify the correct separator to use when parsing a flat file.", "", "", ""], "answers": ["<p>sep=</p>", "<p>delim=</p>", "<p>char=</p>", "<p>None of the above</p>"]}, "correct_response": ["a"], "section": "", "question_plain": "Which argument allows us to specify a delimiter other than a comma when using pd.read_csv()?", "related_lectures": [{"_class": "lecture", "id": 33233904, "title": "Preprocessing with read_csv", "created": "2022-07-25T13:01:04Z", "is_published": true, "asset": {"_class": "asset", "id": 42866150, "asset_type": "Video", "title": "S8L1_Read_CSV_Revisited_V2.mp4", "created": "2022-08-03T20:45:41Z"}, "object_index": 188, "url": "/course/python-pandas/learn/lecture/33233904"}]}, {"_class": "assessment", "id": 49355810, "assessment_type": "multiple-choice", "prompt": {"question": "<p>Which read_csv argument allows us to specify date columns to convert?</p>", "relatedLectureIds": ["33233914"], "feedbacks": ["", "the parse_dates= argument allows us to specify a column or list of columns to parse as dates.", "", ""], "answers": ["<p>dates=</p>", "<p>parse_dates=</p>", "<p>date_cols=</p>", "<p>dtypes=</p>"]}, "correct_response": ["b"], "section": "", "question_plain": "Which read_csv argument allows us to specify date columns to convert?", "related_lectures": [{"_class": "lecture", "id": 33233914, "title": "Parsing Dates & Data Types", "created": "2022-07-25T13:01:22Z", "is_published": true, "asset": {"_class": "asset", "id": 42866118, "asset_type": "Video", "title": "S8L4_Parsing_Dates_And_DataTypes_V2.mp4", "created": "2022-08-03T20:45:00Z"}, "object_index": 194, "url": "/course/python-pandas/learn/lecture/33233914"}]}, {"_class": "assessment", "id": 49355812, "assessment_type": "multiple-choice", "prompt": {"question": "<p>Which method writes a DataFrame to Excel?</p>", "relatedLectureIds": ["33233928"], "feedbacks": ["", "", "The .to_excel() method will write a dataframe to an Excel file.", ""], "answers": ["<p>.excel()</p>", "<p>.write_excel()</p>", "<p>.to_excel()</p>", "<p>.excellify()</p>"]}, "correct_response": ["c"], "section": "", "question_plain": "Which method writes a DataFrame to Excel?", "related_lectures": [{"_class": "lecture", "id": 33233928, "title": "Exporting to Flat Files", "created": "2022-07-25T13:01:55Z", "is_published": true, "asset": {"_class": "asset", "id": 42866056, "asset_type": "Video", "title": "S8L9_Exporting_To_Flat_Files_V2.mp4", "created": "2022-08-03T20:43:42Z"}, "object_index": 196, "url": "/course/python-pandas/learn/lecture/33233928"}]}, {"_class": "assessment", "id": 49355816, "assessment_type": "multiple-choice", "prompt": {"question": "<p>Which argument in the .to_excel() method specifies which sheet to write to?</p>", "relatedLectureIds": ["33233928"], "feedbacks": ["The sheet_name argument accepts the name of the sheet, or it's position, to specify which sheet to write to.", "", "", ""], "answers": ["<p>sheet_name=</p>", "<p>sheet=</p>", "<p>sheet_num=</p>", "<p>Only the first sheet in an Excel workbook can be written to.</p>"]}, "correct_response": ["a"], "section": "", "question_plain": "Which argument in the .to_excel() method specifies which sheet to write to?", "related_lectures": [{"_class": "lecture", "id": 33233928, "title": "Exporting to Flat Files", "created": "2022-07-25T13:01:55Z", "is_published": true, "asset": {"_class": "asset", "id": 42866056, "asset_type": "Video", "title": "S8L9_Exporting_To_Flat_Files_V2.mp4", "created": "2022-08-03T20:43:42Z"}, "object_index": 196, "url": "/course/python-pandas/learn/lecture/33233928"}]}, {"_class": "assessment", "id": 49355818, "assessment_type": "multiple-choice", "prompt": {"question": "<p>Which of the following libraries helps connect to SQL Databases?</p>", "relatedLectureIds": ["33233938"], "feedbacks": ["", "", "The SQLAlchemy library helps connect to SQL databases", ""], "answers": ["<p>Python standard libary</p>", "<p>SQL</p>", "<p>SQLAlchemy</p>", "<p>There is no library that helps with this.</p>"]}, "correct_response": ["c"], "section": "", "question_plain": "Which of the following libraries helps connect to SQL Databases?", "related_lectures": [{"_class": "lecture", "id": 33233938, "title": "Working With SQL Databases", "created": "2022-07-25T13:02:14Z", "is_published": true, "asset": {"_class": "asset", "id": 42866196, "asset_type": "Video", "title": "S8L12_SQL_Databases_V2.mp4", "created": "2022-08-03T20:48:25Z"}, "object_index": 199, "url": "/course/python-pandas/learn/lecture/33233938"}]}, {"_class": "assessment", "id": 49355824, "assessment_type": "multiple-choice", "prompt": {"question": "<p>Which of the following file types can be read in with Pandas?</p>", "relatedLectureIds": ["33233942"], "feedbacks": ["", "", "", "All of the file formats listed can be read in with Pandas, and many more can as well!"], "answers": ["<p>.csv</p>", "<p>.xlsx</p>", "<p>.json</p>", "<p>All of the above</p>"]}, "correct_response": ["d"], "section": "", "question_plain": "Which of the following file types can be read in with Pandas?", "related_lectures": [{"_class": "lecture", "id": 33233942, "title": "Other Supported File Formats", "created": "2022-07-25T13:02:20Z", "is_published": true, "asset": {"_class": "asset", "id": 42866198, "asset_type": "Video", "title": "S8L13_Other_Data_Sources_V2.mp4", "created": "2022-08-03T20:48:27Z"}, "object_index": 200, "url": "/course/python-pandas/learn/lecture/33233942"}]}]};
      var correct = 0;
      var total = 0;
      const questionData = quizData.questions
      const passPercent = quizData.pass_percent

      function main() {
        total = questionData.length;

        var questions = [];
        for (var i = 0; i < questionData.length; i++) {
          var question = questionData[i];
          var questionText = question.prompt.question;
          var answers = question.prompt.answers;
          var correctAnswer = question.correct_response[0];
          var correctAnswerText = answers[correctAnswer.charCodeAt(0) - 97];
          var questionObj = {
            question: questionText,
            correctAnswer: correctAnswerText,
            answers: answers,
            id: question.id,
          };
          questions.push(questionObj);
        }

        updateScore();

        // display the questions
        var questionsContainer = document.getElementById("quiz-container");
        for (var i = 0; i < questions.length; i++) {
          var question = questions[i];
          var questionElement = document.createElement("form");
          questionElement.className = "question";
          questionElement.innerHTML =
            "<span>Question " +
            (i + 1) +
            ":</span>" +
            '<div class="question-prompt">' +
            question.question +
            "</div>";
          questionElement.id = question.id;
          questionElement.classList.add("quiz-container");
          var answersElement = document.createElement("ul");
          answersElement.className = "answers";
          for (var j = 0; j < question.answers.length; j++) {
            var answer = question.answers[j];
            var answerElement = document.createElement("li");
            answerElement.className = "answer";
            answerElement.innerHTML =
              '<label for="input-' +
              question.id +
              "-" +
              j +
              '"><div onclick="select(' +
              question.id +
              ", " +
              j +
              ')"><span></span><input id="input-' +
              question.id +
              "-" +
              j +
              '" type="radio" name="question' +
              i +
              '" value="' +
              j +
              '">' +
              answer +
              "</input></div></label>";
            answerElement.classList.add("question-answer");
            answersElement.appendChild(answerElement);
          }

          questionElement.appendChild(answersElement);

          // add a submit button
          var submitButton = document.createElement("button");
          submitButton.className = "submit";
          submitButton.innerHTML = "Submit";
          submitButton.classList.add("submit-button");

          submitButton.addEventListener("click", function (e) {
            e.preventDefault();
            var questionElement = e.target.parentElement;
            var questionId = questionElement.id;
            var question = questions.filter(function (q) {
              return q.id == questionId;
            })[0];

            // set the border color of all answers to black
            var answers = questionElement.getElementsByClassName("answer");
            for (var i = 0; i < answers.length; i++) {
              console.log(answers[i]);
              answers[i].children[0].style.borderColor = "#1c1d1f";
            }

            var answer = questionElement.querySelector(
              'input[type="radio"]:checked'
            );
            if (answer) {
              var answerIndex = answer.value;
              var answerText = question.answers[answerIndex];
              if (answerText == question.correctAnswer) {
                answer.parentElement.parentElement.style.borderColor =
                  "limegreen";
                // alert("Correct!");
                correct++;
                updateScore();
              } else {
                answer.parentElement.parentElement.style.borderColor = "red";
                // alert("Incorrect!");
              }
            } else {
              alert("Please select an answer.");
            }
          });

          // add button
          questionElement.appendChild(submitButton);

          questionsContainer.appendChild(questionElement);
        }
      }

      function select(question, answer) {
        var questionElement = document.getElementById(question);
        var answers = questionElement.getElementsByClassName("answer");
        for (var i = 0; i < answers.length; i++) {
          var span = answers[i].children[0].children[0].children[0];
          var input = answers[i].children[0].children[0].children[1];
          span.classList.remove("selected");
          input.checked = false;
        }
        var span = answers[answer].children[0].children[0].children[0];
        var input = answers[answer].children[0].children[0].children[1];
        span.classList.add("selected");
        input.checked = true;
      }

      function updateScore() {
        var scoreElem = document.getElementById("score");
        const score = (correct / total) * 100;
        scoreElem.innerHTML = "Score: " + score + "/" + passPercent + "%";
      }
    </script>
  </body>
</html>
