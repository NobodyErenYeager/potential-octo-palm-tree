    <script>
      const quizData = {"title": "003 Appending DataFrames", "hasInstructions": true, "hasTests": true, "hasSolutions": true, "instructions": "<ol><li><p><strong>Load the DataFrames</strong>: Import the two datasets, 'BTC_03_2020_05_2022.csv' and 'BTC_06_2022_05_2024.csv', making sure to parse dates correctly.</p></li><li><p><strong>Append DataFrames</strong>: Use the <strong>pd.concat</strong> function to append the <strong>current_period</strong> DataFrame to the <strong>prior_period</strong> DataFrame. Ensure to ignore the index to maintain a sequential index in the combined DataFrame.</p></li><li><p><strong>Inspect the Combined DataFrame</strong>: Print the <strong>BTC_consolidated</strong> DataFrame to verify the append operation was successful.</p></li></ol>", "tests": [{"file_name": "evaluate.py", "content": "import unittest\r\nimport pandas as pd\r\n\r\nclass TestAppendingDataFrames(unittest.TestCase):\r\n    def test_append_dataframes(self):\r\n        data1 = {'Date': pd.date_range(start='2020-03-01', periods=3, freq='M'),\r\n                 'Close': [5000, 5500, 6000]}\r\n        data2 = {'Date': pd.date_range(start='2022-06-01', periods=3, freq='M'),\r\n                 'Close': [30000, 31000, 32000]}\r\n\r\n        df1 = pd.DataFrame(data1)\r\n        df2 = pd.DataFrame(data2)\r\n        \r\n        result = pd.concat([df1, df2], ignore_index=True)\r\n        expected_dates = pd.to_datetime(['2020-03-31', '2020-04-30', '2020-05-31', '2022-06-30', '2022-07-31', '2022-08-31'])\r\n        expected_closes = [5000, 5500, 6000, 30000, 31000, 32000]\r\n        \r\n        pd.testing.assert_series_equal(result['Date'], pd.Series(expected_dates), check_names=False)\r\n        pd.testing.assert_series_equal(result['Close'], pd.Series(expected_closes), check_names=False)\r\n\r\n# Run the tests\r\nif __name__ == '__main__':\r\n    unittest.main()\r\n"}], "solutions": [{"file_name": "exercise.py", "content": "import pandas as pd\r\n\r\n# Load data for the earlier period\r\nprior_period = pd.read_csv(\"BTC_03_2020_05_2022.csv\", parse_dates=['Date'])\r\n\r\n# Load data for the later period\r\ncurrent_period = pd.read_csv(\"BTC_06_2022_05_2024.csv\", parse_dates=['Date'])\r\n\r\n# Append the current period data to the prior period data, resetting the index\r\nBTC_consolidated = pd.concat([prior_period, current_period], ignore_index=True)\r\n\r\n# Print the combined DataFrame\r\nprint(BTC_consolidated)\r\n"}, {"file_name": "BTC_06_2022_05_2024.csv", "content": "Date\t  Ticker  Open\t\t  High       Low        Close     Adj Close\t     Volume                   \r\n01/06/2022\tBTC\t 31,793 \t 31,957 \t 17,709 \t 19,785 \t 19,785 \t 923,939,211,678 \r\n01/07/2022\tBTC\t 19,820 \t 24,573 \t 18,967 \t 23,337 \t 23,337 \t 927,582,363,389 \r\n01/08/2022\tBTC\t 23,337 \t 25,136 \t 19,601 \t 20,050 \t 20,050 \t 894,192,654,543 \r\n01/09/2022\tBTC\t 20,050 \t 22,674 \t 18,290 \t 19,432 \t 19,432 \t 1,123,272,250,385 \r\n01/10/2022\tBTC\t 19,431 \t 20,988 \t 18,320 \t 20,496 \t 20,496 \t 957,903,424,925 \r\n01/11/2022\tBTC\t 20,495 \t 21,447 \t 15,599 \t 17,169 \t 17,169 \t 1,224,531,549,126 \r\n01/12/2022\tBTC\t 17,168 \t 18,319 \t 16,398 \t 16,547 \t 16,547 \t 541,356,716,034 \r\n01/01/2023\tBTC\t 16,548 \t 23,920 \t 16,521 \t 23,139 \t 23,139 \t 690,994,018,045 \r\n01/02/2023\tBTC\t 23,138 \t 25,134 \t 21,460 \t 23,147 \t 23,147 \t 723,968,574,897 \r\n01/03/2023\tBTC\t 23,151 \t 29,160 \t 19,628 \t 28,478 \t 28,478 \t 883,299,703,608 \r\n01/04/2023\tBTC\t 28,473 \t 31,006 \t 27,071 \t 29,269 \t 29,269 \t 511,540,319,004 \r\n01/05/2023\tBTC\t 29,227 \t 29,820 \t 25,878 \t 27,220 \t 27,220 \t 443,473,015,479 \r\n01/06/2023\tBTC\t 27,218 \t 31,390 \t 24,797 \t 30,477 \t 30,477 \t 481,734,214,225 \r\n01/07/2023\tBTC\t 30,472 \t 31,815 \t 28,934 \t 29,230 \t 29,230 \t 382,224,489,090 \r\n01/08/2023\tBTC\t 29,231 \t 30,177 \t 25,409 \t 25,931 \t 25,931 \t 437,724,169,499 \r\n01/09/2023\tBTC\t 25,934 \t 27,489 \t 24,930 \t 26,968 \t 26,968 \t 3       function renderCodeList(rootElement, codeList, className, titlePrefix) {
        for (var i = 0; i < codeList.length; i++) {
          var elem = codeList[i];
          var jsElem = document.createElement("div");
          jsElem.className = className;
          var jsElemTitle = document.createElement("h3");
          jsElemTitle.innerHTML = titlePrefix + " " + (i + 1);
          var jsElemBody = document.createElement("code");
          jsElemBody.className = "code-block black-block";
          jsElemBody.innerHTML = "<pre>" + elem.content + "</pre>";
          jsElem.appendChild(jsElemTitle);
          jsElem.appendChild(jsElemBody);
          rootElement.appendChild(jsElem);
        }
      }
      
      function main() {
        // display the assignment
        var codingTitle = document.getElementById("coding-title");
        codingTitle.innerHTML = quizData.title;
        
        var codingInstructions = document.getElementById("coding-instructions");
        if (quizData.hasInstructions) {
          codingInstructions.innerHTML = quizData.instructions;
        } else {
          codingInstructions.innerHTML = "<span class=\"italic-text\">" + quizData.instructions
            + "</span>";
        }

        // display the test(s)
        var codingTests = document.getElementById("coding-tests");
        if (!quizData.hasTests) {
          codingTests.innerHTML = "<span class=\"italic-text\">" + quizData.tests + "</span>";
        } else {
          renderCodeList(codingTests, quizData.tests, "coding-test", "Test");

        // display the solution(s)
        var codingSolutions = document.getElementById("coding-solutions");

        } else {
