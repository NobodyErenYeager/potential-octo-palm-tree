      const quizData = {"title": "010 Left Joins", "hasInstructions": true, "hasTests": true, "hasSolutions": true, "instructions": "<ol><li><p><strong>Load the Data</strong>: Start by loading the <strong>cryptocurrency_BTC.csv</strong> and <strong>additional_data.csv</strong> into separate Pandas DataFrames. Ensure both datasets have 'Date' parsed as datetime objects.</p></li><li><p><strong>Perform the Left Join</strong>: Use the <strong>merge</strong> function to join the datasets on the 'Date' column. Since this is a left join, all rows from the primary cryptocurrency dataset and matching rows from the additional data will be included.</p></li><li><p><strong>Review the Output</strong>: After merging, print the resulting DataFrame to review the enriched data. Verify that the additional data columns are correctly aligned with the cryptocurrency data based on the 'Date'.</p></li></ol>", "tests": [{"file_name": "evaluate.py", "content": "import unittest\r\nimport pandas as pd\r\n\r\nclass TestLeftJoin(unittest.TestCase):\r\n    def test_left_join(self):\r\n        # Creating sample data frames to mimic the actual data\r\n        data_crypto = {\r\n            'Date': pd.to_datetime(['2022-01-01', '2022-01-02']),\r\n            'Close': [35000, 36000]\r\n        }\r\n        data_additional = {\r\n            'Date': pd.to_datetime(['2022-01-01']),\r\n            'Market_Cap': [700000000]\r\n        }\r\n        df_crypto = pd.DataFrame(data_crypto)\r\n        df_additional = pd.DataFrame(data_additional)\r\n        \r\n        # Performing the left join\r\n        result = df_crypto.merge(df_additional, how='left', left_on='Date', right_on='Date')\r\n        \r\n        # Expected DataFrame\r\n        expected_data = {\r\n            'Date': pd.to_datetime(['2022-01-01', '2022-01-02']),\r\n            'Close': [35000, 36000],\r\n            'Market_Cap': [700000000, None]\r\n        }\r\n        expected_df = pd.DataFrame(expected_data)\r\n        \r\n        # Test if the result from the merge matches the expected DataFrame\r\n        pd.testing.assert_frame_equal(result, expected_df)\r\n\r\n# Run the tests\r\nif __name__ == '__main__':\r\n    unittest.main()\r\n"}], "solutions": [{"file_name": "exercise.py", "content": "import pandas as pd\r\n\r\n# Load the main cryptocurrency data, ensuring the 'Date' column is parsed as datetime\r\ncrypto = pd.read_csv(\"cryptocurrency_BTC.csv\", parse_dates=['Date'])\r\n\r\n# Load the additional data, also parsing 'Date' as datetime\r\ncrypto_add = pd.read_csv(\"additional_data.csv\", parse_dates=['Date'])\r\n\r\n# Perform a left join on the 'Date' column to combine the two datasets\r\n# This retains all entries from the main crypto dataset and appends matching entries from the additional data\r\nmarket_cap = crypto.merge(crypto_add, how='left', left_on='Date', right_on='Date')\r\n\r\n# Display the resulting DataFrame with the market cap data added\r\nprint(market_cap)\r\n"}, {"file_name": "additional_data.csv", "content": "Date\t     Market_Cap\r\n01/06/2022\t 377,526,215,552 \r\n01/07/2022\t 445,941,074,223 \r\n01/08/2022\t 383,710,102,295 \r\n01/09/2022\t 372,414,733,487 \r\n01/10/2022\t 393,413,045,573 \r\n01/11/2022\t 329,997,633,644 \r\n01/12/2022\t 318,516,317,872 \r\n01/01/2023\t 446,082,285,297 \r\n01/02/2023\t 446,846,764,116 \r\n01/03/2023\t 550,593,053,897 \r\n01/04/2023\t 566,661,285,145 \r\n01/05/2023\t 527,773,175,252 \r\n01/06/2023\t 591,758,288,456 \r\n01/07/2023\t 568,365,621,733 \r\n01/08/2023\t 504,957,555,551 \r\n01/09/2023\t 525,885,640,460 \r\n01/10/2023\t 677,047,621,125 \r\n01/11/2023\t 737,560,917,366 \r\n01/12/2023\t 827,811,209,384 \r\n01/01/2024\t 835,231,465,697 \r\n01/02/2024\t 1,202,008,882,584 \r\n01/03/2024\t 1,403,108,244,336 \r\n01/04/2024\t 1,193,544,962,108 \r\n"}, {"file_name": "cryptocurrency_BTC.csv", "content": "Date\t  Ticker  Open\t\t  High       Low        Close     Adj Close\t     Volume                   \r\n01/06/2022\tBTC\t 31,793 \t 31,957       function renderCodeList(rootElement, codeList, className, titlePrefix) {
        for (var i = 0; i < codeList.length; i++) {
          var elem = codeList[i];
          var jsElem = document.createElement("div");
          jsElem.className = className;
          var jsElemTitle = document.createElement("h3");
          jsElemTitle.innerHTML = titlePrefix + " " + (i + 1);
          var jsElemBody = document.createElement("code");
          jsElemBody.className = "code-block black-block";
          jsElemBody.innerHTML = "<pre>" + elem.content + "</pre>";
          jsElem.appendChild(jsElemTitle);
          jsElem.appendChild(jsElemBody);
          rootElement.appendChild(jsElem);
        }
      }
      
      function main() {
        // display the assignment
        var codingTitle = document.getElementById("coding-title");
        codingTitle.innerHTML = quizData.title;
        
        var codingInstructions = document.getElementById("coding-instructions");
        if (quizData.hasInstructions) {
          codingInstructions.innerHTML = quizData.instructions;
        } else {
          codingInstructions.innerHTML = "<span class=\"italic-text\">" + quizData.instructions
            + "</span>";
        }

        // display the test(s)
        var codingTests = document.getElementById("coding-tests");
        if (!quizData.hasTests) {
          codingTests.innerHTML = "<span class=\"italic-text\">" + quizData.tests + "</span>";
        } else {
          renderCodeList(codingTests, quizData.tests, "coding-test", "Test");
        }
        

        // display the solution(s)
        var codingSolutions = document.getElementById("coding-solutions");
        if (!quizData.hasSolutions) {
          codingSolutions.innerHTML = "<span class=\"italic-text\">" + quizData.solutions + "</span>";
        } else {
          renderCodeList(codingSolutions, quizData.solutions, "coding-solution", "Solution");
        }
      }
