<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quiz</title>

    <style>
      body {
        font-family: sf pro text, -apple-system, BlinkMacSystemFont, Roboto,
          segoe ui, Helvetica, Arial, sans-serif, apple color emoji,
          segoe ui emoji, segoe ui symbol;
        font-weight: 400;
        line-height: 22.4px;
        font-size: 16px;
      }
      p,
      h1,
      h2,
      h3,
      h4,
      h5,
      h6,
      ul,
      ol {
        font-size: 16px;
        font-weight: 400;
      }
      ul {
        list-style: none;
        margin: 0;
        padding: 0;
        max-width: none;
      }
      code {
        background-color: #fff;
        border: 1px solid #d1d7dc;
        color: #b4690e;
        font-size: 90%;
        padding: 0.2rem 0.4rem;
      }
      .quiz-content {
        padding: 2.4rem;
        word-break: break-word;
        max-width: 86rem;
        margin: 0 auto;
      }
      .quiz-container {
        margin: 0 auto;
        max-width: 84rem;
        padding: 0;
      }
      .question {
        margin-bottom: 5rem;
      }
      .question span {
        font-size: 24px;
        font-weight: 700;
      }
      .question-prompt {
        margin-top: 0.8rem;
        font-weight: 700;
      }
      .question-answer {
        margin-top: 1.6rem;
        padding-left: 0;
        box-sizing: border-box;
      }
      .question-answer label {
        max-width: 80rem;
        position: relative;
        cursor: pointer;
        display: flex;
        min-width: 18rem;
        border: solid #1c1d1f 2px;
      }
      .question-answer div {
        display: flex;
        align-items: center;
        padding: 0.5rem;
        width: 100%;
      }
      .question-answer div:hover {
        background-color: #f5f5f5;
      }
      .question-answer input {
        display: none;
      }
      .question-answer span {
        width: 1rem;
        height: 1rem;
        margin-right: 1.6rem;
        top: 0;
        border-radius: 50%;
        display: inline-block;
        flex-shrink: 0;
        border: 0.2rem solid #1c1d1f;
        position: relative;
      }
      .selected {
        background: #1c1d1f;
        box-shadow: 0 0 0 0.4rem #fff inset;
      }
      .score {
              position: fixed;
            }
    </style>
  </head>

  <body onload="main()">
    <div id="score" class="score">
      <span>Score: N/A of N/A</span>
    </div>
    <div id="quiz-container" class="quiz-content"></div>

    <script>
      const quizData = {"pass_percent": 70, "questions": [{"_class": "assessment", "id": 49355704, "assessment_type": "multiple-choice", "prompt": {"question": "<p>Calling the .sum() method on an entire DataFrame returns what?</p>", "relatedLectureIds": ["33233684"], "feedbacks": ["", "", "Calling the sum method on a DataFrame will return the column sums of all compatible columns in the DataFrame. ", ""], "answers": ["<p>The count of rows in the DataFrame.</p>", "<p>The sum of the furthest right column in a DataFrame.</p>", "<p>The sum of all compatible columns.</p>", "<p>The sum of each row grouped by the index.</p>"]}, "correct_response": ["c"], "section": "", "question_plain": "Calling the .sum() method on an entire DataFrame returns what?", "related_lectures": [{"_class": "lecture", "id": 33233684, "title": "Basic Aggregations", "created": "2022-07-25T12:52:23Z", "is_published": true, "asset": {"_class": "asset", "id": 42825250, "asset_type": "Video", "title": "S4L1_Basic_Aggregations_V2.mp4", "created": "2022-08-01T22:33:33Z"}, "object_index": 113, "url": "/course/python-pandas/learn/lecture/33233684"}]}, {"_class": "assessment", "id": 49355708, "assessment_type": "multiple-choice", "prompt": {"question": "<p>Which method allows us to aggregate a DataFrame by a specific column or columns?</p>", "relatedLectureIds": ["33233690"], "feedbacks": ["", "", ".groupby([cols]) will group our DataFrame by the columns passed.", ""], "answers": ["<p>.aggregate()</p>", "<p>.agg()</p>", "<p>.groupby()</p>", "<p>.groups()</p>"]}, "correct_response": ["c"], "section": "", "question_plain": "Which method allows us to aggregate a DataFrame by a specific column or columns?", "related_lectures": [{"_class": "lecture", "id": 33233690, "title": "The Groupby Method", "created": "2022-07-25T12:52:31Z", "is_published": true, "asset": {"_class": "asset", "id": 42825280, "asset_type": "Video", "title": "S4L2_Groupby_V2.mp4", "created": "2022-08-01T22:35:03Z"}, "object_index": 114, "url": "/course/python-pandas/learn/lecture/33233690"}]}, {"_class": "assessment", "id": 49355714, "assessment_type": "multiple-choice", "prompt": {"question": "<p>What gets created when grouping a DataFrame by multiple columns?</p>", "relatedLectureIds": ["33233704"], "feedbacks": ["By default, every column a DataFrame that is grouped by  becomes a layer in a Multi-Index.", "", "", ""], "answers": ["<p>A Multi-Index DataFrame</p>", "<p>Error: A DataFrame can only be grouped by a single column.</p>", "<p>A two row DataFrame.</p>", "<p>Two DataFrames.</p>"]}, "correct_response": ["a"], "section": "", "question_plain": "What gets created when grouping a DataFrame by multiple columns?", "related_lectures": [{"_class": "lecture", "id": 33233704, "title": "Multi-Index DataFrames", "created": "2022-07-25T12:53:11Z", "is_published": true, "asset": {"_class": "asset", "id": 42825360, "asset_type": "Video", "title": "S4L8_Multi_Index_DataFrames_V2.mp4", "created": "2022-08-01T22:40:07Z"}, "object_index": 120, "url": "/course/python-pandas/learn/lecture/33233704"}]}, {"_class": "assessment", "id": 49355716, "assessment_type": "multiple-choice", "prompt": {"question": "<p>How do we remove a single layer of an index from a multi-level index?</p>", "relatedLectureIds": ["33233706"], "feedbacks": ["", ".droplevel() will removed the specified level from a multi-index. Reset_index() is equivalent for a single level, but not for multiple levels as all levels will be removed from the index.", "", ""], "answers": ["<p>.reset_index()</p>", "<p>.droplevel()</p>", "<p>.drop()</p>", "<p>.remove()</p>"]}, "correct_response": ["b"], "section": "", "question_plain": "How do we remove a single layer of an index from a multi-level index?", "related_lectures": [{"_class": "lecture", "id": 33233706, "title": "Modifying Multi-Indices", "created": "2022-07-25T12:53:16Z", "is_published": true, "asset": {"_class": "asset", "id": 42825324, "asset_type": "Video", "title": "S4L9_Modifying_Multi_Indices_V2.mp4", "created": "2022-08-01T22:37:49Z"}, "object_index": 121, "url": "/course/python-pandas/learn/lecture/33233706"}]}, {"_class": "assessment", "id": 49355724, "assessment_type": "multiple-choice", "prompt": {"question": "<p>How many rows will be in the DataFrame returned by the following aggregation?</p><img src=\"https://img-c.udemycdn.com/redactor/raw/quiz_question/2022-07-26_01-15-46-0faf9f34e9c8a054b9571afd5ffb2b43.png\">", "relatedLectureIds": ["33233712"], "feedbacks": ["", "There are three unique values in the column being grouped by, so the DataFrame returned will contain 3 rows.", "", ""], "answers": ["<p>0</p>", "<p>3</p>", "<p>5</p>", "<p>This is not a valid aggregation.</p>"]}, "correct_response": ["b"], "section": "", "question_plain": "How many rows will be in the DataFrame returned by the following aggregation?", "related_lectures": [{"_class": "lecture", "id": 33233712, "title": "The Agg Method & Named Aggregations", "created": "2022-07-25T12:53:35Z", "is_published": true, "asset": {"_class": "asset", "id": 42825378, "asset_type": "Video", "title": "S4L12_The_Agg_Method_V2.mp4", "created": "2022-08-01T22:42:14Z"}, "object_index": 124, "url": "/course/python-pandas/learn/lecture/33233712"}]}, {"_class": "assessment", "id": 49355726, "assessment_type": "multiple-choice", "prompt": {"question": "<p>How many layers will the column axis have when performing a single aggregation with the agg method?</p>", "relatedLectureIds": ["33233712"], "feedbacks": ["", "Only multiple aggregations return a Multi-Index in our column axis, a single aggregation returns a DataFrame with single layer column index", "", ""], "answers": ["<p>0</p>", "<p>1</p>", "<p>2</p>", "<p>3</p>"]}, "correct_response": ["b"], "section": "", "question_plain": "How many layers will the column axis have when performing a single aggregation with the agg method?", "related_lectures": [{"_class": "lecture", "id": 33233712, "title": "The Agg Method & Named Aggregations", "created": "2022-07-25T12:53:35Z", "is_published": true, "asset": {"_class": "asset", "id": 42825378, "asset_type": "Video", "title": "S4L12_The_Agg_Method_V2.mp4", "created": "2022-08-01T22:42:14Z"}, "object_index": 124, "url": "/course/python-pandas/learn/lecture/33233712"}]}, {"_class": "assessment", "id": 49355730, "assessment_type": "multiple-choice", "prompt": {"question": "<p>Which method allow us to perform aggregations while keeping rows intact?</p>", "relatedLectureIds": ["33233718"], "feedbacks": ["", "", "", ".transform() allows us to create a column storing aggregations by groups while keeping row numbers."], "answers": ["<p>.rowagg()</p>", "<p>.transfer()</p>", "<p>.nogroup()</p>", "<p>.transform()</p>"]}, "correct_response": ["d"], "section": "", "question_plain": "Which method allow us to perform aggregations while keeping rows intact?", "related_lectures": [{"_class": "lecture", "id": 33233718, "title": "PRO TIP: Transforming DataFrames", "created": "2022-07-25T12:53:53Z", "is_published": true, "asset": {"_class": "asset", "id": 42825374, "asset_type": "Video", "title": "S4L15_Transform_V2.mp4", "created": "2022-08-01T22:42:06Z"}, "object_index": 127, "url": "/course/python-pandas/learn/lecture/33233718"}]}, {"_class": "assessment", "id": 49355734, "assessment_type": "multiple-choice", "prompt": {"question": "<p>Which of the following allows us to summarize data by pivoting?</p>", "relatedLectureIds": ["33233726"], "feedbacks": ["", ".pivot_table() will create a pivot table with the specified aggregations.", "", ""], "answers": ["<p>.pivot()</p>", "<p>.pivot_table()</p>", "<p>pd.pivot_table()</p>", "<p>pd.pivot()</p>"]}, "correct_response": ["b"], "section": "", "question_plain": "Which of the following allows us to summarize data by pivoting?", "related_lectures": [{"_class": "lecture", "id": 33233726, "title": "Pivot Tables in Pandas", "created": "2022-07-25T12:54:09Z", "is_published": true, "asset": {"_class": "asset", "id": 42825388, "asset_type": "Video", "title": "S4L18_Pivot_Tables_V2.mp4", "created": "2022-08-01T22:42:45Z"}, "object_index": 130, "url": "/course/python-pandas/learn/lecture/33233726"}]}, {"_class": "assessment", "id": 49355736, "assessment_type": "multiple-choice", "prompt": {"question": "<p>Which argument in the .pivot_table() method specifies the column to serve as rows in the pivot table?</p>", "relatedLectureIds": ["33233726"], "feedbacks": ["The index argument sets the index that serve as row labels in the pivot table.", "", "", ""], "answers": ["<p>index=</p>", "<p>rows=</p>", "<p>columns=</p>", "<p>row_vals=</p>"]}, "correct_response": ["a"], "section": "", "question_plain": "Which argument in the .pivot_table() method specifies the column to serve as rows in the pivot table?", "related_lectures": [{"_class": "lecture", "id": 33233726, "title": "Pivot Tables in Pandas", "created": "2022-07-25T12:54:09Z", "is_published": true, "asset": {"_class": "asset", "id": 42825388, "asset_type": "Video", "title": "S4L18_Pivot_Tables_V2.mp4", "created": "2022-08-01T22:42:45Z"}, "object_index": 130, "url": "/course/python-pandas/learn/lecture/33233726"}]}]};
      var correct = 0;
      var total = 0;
      const questionData = quizData.questions
      const passPercent = quizData.pass_percent

      function main() {
        total = questionData.length;

        var questions = [];
        for (var i = 0; i < questionData.length; i++) {
          var question = questionData[i];
          var questionText = question.prompt.question;
          var answers = question.prompt.answers;
          var correctAnswer = question.correct_response[0];
          var correctAnswerText = answers[correctAnswer.charCodeAt(0) - 97];
          var questionObj = {
            question: questionText,
            correctAnswer: correctAnswerText,
            answers: answers,
            id: question.id,
          };
          questions.push(questionObj);
        }

        updateScore();

        // display the questions
        var questionsContainer = document.getElementById("quiz-container");
        for (var i = 0; i < questions.length; i++) {
          var question = questions[i];
          var questionElement = document.createElement("form");
          questionElement.className = "question";
          questionElement.innerHTML =
            "<span>Question " +
            (i + 1) +
            ":</span>" +
            '<div class="question-prompt">' +
            question.question +
            "</div>";
          questionElement.id = question.id;
          questionElement.classList.add("quiz-container");
          var answersElement = document.createElement("ul");
          answersElement.className = "answers";
          for (var j = 0; j < question.answers.length; j++) {
            var answer = question.answers[j];
            var answerElement = document.createElement("li");
            answerElement.className = "answer";
            answerElement.innerHTML =
              '<label for="input-' +
              question.id +
              "-" +
              j +
              '"><div onclick="select(' +
              question.id +
              ", " +
              j +
              ')"><span></span><input id="input-' +
              question.id +
              "-" +
              j +
              '" type="radio" name="question' +
              i +
              '" value="' +
              j +
              '">' +
              answer +
              "</input></div></label>";
            answerElement.classList.add("question-answer");
            answersElement.appendChild(answerElement);
          }

          questionElement.appendChild(answersElement);

          // add a submit button
          var submitButton = document.createElement("button");
          submitButton.className = "submit";
          submitButton.innerHTML = "Submit";
          submitButton.classList.add("submit-button");

          submitButton.addEventListener("click", function (e) {
            e.preventDefault();
            var questionElement = e.target.parentElement;
            var questionId = questionElement.id;
            var question = questions.filter(function (q) {
              return q.id == questionId;
            })[0];

            // set the border color of all answers to black
            var answers = questionElement.getElementsByClassName("answer");
            for (var i = 0; i < answers.length; i++) {
              console.log(answers[i]);
              answers[i].children[0].style.borderColor = "#1c1d1f";
            }

            var answer = questionElement.querySelector(
              'input[type="radio"]:checked'
            );
            if (answer) {
              var answerIndex = answer.value;
              var answerText = question.answers[answerIndex];
              if (answerText == question.correctAnswer) {
                answer.parentElement.parentElement.style.borderColor =
                  "limegreen";
                // alert("Correct!");
                correct++;
                updateScore();
              } else {
                answer.parentElement.parentElement.style.borderColor = "red";
                // alert("Incorrect!");
              }
            } else {
              alert("Please select an answer.");
            }
          });

          // add button
          questionElement.appendChild(submitButton);

          questionsContainer.appendChild(questionElement);
        }
      }

      function select(question, answer) {
        var questionElement = document.getElementById(question);
        var answers = questionElement.getElementsByClassName("answer");
        for (var i = 0; i < answers.length; i++) {
          var span = answers[i].children[0].children[0].children[0];
          var input = answers[i].children[0].children[0].children[1];
          span.classList.remove("selected");
          input.checked = false;
        }
        var span = answers[answer].children[0].children[0].children[0];
        var input = answers[answer].children[0].children[0].children[1];
        span.classList.add("selected");
        input.checked = true;
      }

      function updateScore() {
        var scoreElem = document.getElementById("score");
        const score = (correct / total) * 100;
        scoreElem.innerHTML = "Score: " + score + "/" + passPercent + "%";
      }
    </script>
  </body>
</html>
