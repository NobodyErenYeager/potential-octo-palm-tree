<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Coding Assignment</title>

    <style>
      body {
        font-family: sf pro text, -apple-system, BlinkMacSystemFont, Roboto,
          segoe ui, Helvetica, Arial, sans-serif, apple color emoji,
          segoe ui emoji, segoe ui symbol;
        font-weight: 400;
        line-height: 22.4px;
        font-size: 16px;
      }
      p, ul, ol {
        font-size: 16px;
        font-weight: 400;
      }
      h1, h2, h3, h4, h5, h6 {
        font-weight: bold;
      }
      ul {
        list-style: none;
        margin: 0;
        padding: 0;
        max-width: none;
      }
      .code-snippet {
        background-color: #fff;
        border: 1px solid #d1d7dc;
        color: #b4690e;
        font-size: 90%;
        padding: 0.2rem 0.4rem;
      }
      .code-block {
        background-color: #fff;
        color: #b4690e;
        font-size: 90%;
      }
      .black-block {
        color: #000000;
      }
      .italic-text {
        font-style: italic;
      }
    </style>
  </head>

  <body onload="main()">
    <h1 id="coding-title"></h1>
    <div>
      <h2>Instructions</h2>
      <div id="coding-instructions"></div>
    </div>
    <div>
      <h2>Test(s)</h2>
      <div id="coding-tests"></div>
    </div>
    <div>
      <h2>Solution(s)</h2>
      <div id="coding-solutions"></div>
    </div>

    <script>
      const quizData = {"title": "028 Melting DataFrames", "hasInstructions": true, "hasTests": true, "hasSolutions": true, "instructions": "<ol><li><p><strong>Load the Dataset</strong>: Begin by loading the data from \"melted_insurance_df.csv\" into a DataFrame named <strong>melted_insurance_df</strong>.</p></li><li><p><strong>Melt the Data</strong>: Use the <strong>.melt()</strong> method to convert this wide format table into a long format. Keep 'region' as the identifier column, with metrics and ages consolidated into two columns: 'metric_age' and 'value'.</p></li><li><p><strong>Review the Results</strong>: Print the resulting DataFrame to observe the data structure after melting.</p></li></ol>", "tests": [{"file_name": "evaluate.py", "content": "from unittest import TestCase\nimport pandas as pd\nimport exercise\n\nclass TestMeltingDataFrame(TestCase):\n    def test_melting(self):\n        # Load the wide format DataFrame\n        melted_insurance_df = pd.read_csv('melted_insurance_df.csv')\n        \n        # Expected melted DataFrame\n        expected_long_format_df = melted_insurance_df.melt(\n            id_vars=\"region\",\n            var_name=\"metric_age\",\n            value_name=\"value\"\n        )\n        \n        # Test if the melted DataFrame matches the expected results\n        pd.testing.assert_frame_equal(exercise.long_format_df, expected_long_format_df)\n\n"}], "solutions": [{"file_name": "exercise.py", "content": "import pandas as pd\r\n\r\n# Load the dataset\r\nmelted_insurance_df = pd.read_csv(\"melted_insurance_df.csv\")\r\n\r\n# Melt the wide table to a long format\r\nlong_format_df = melted_insurance_df.melt(\r\n    id_vars='region',\r\n    var_name='metric_age',\r\n    value_name='value'\r\n)\r\n\r\n# Display the melted DataFrame\r\nprint(long_format_df)\r\n"}, {"file_name": "melted_insurance_df.csv", "content": "region,     18_bmi,  18_charges,  28_bmi,  28_charges,  37_bmi,  37_charges\r\nnortheast,  33.77,   1725.55,     33.00,   4449.46,     29.83,   6406.41\r\nnorthwest,  22.705,  21984.47,    28.88,   3866.86,     27.74,   7281.51\r\nsoutheast,  25.74,   3756.62,     33.44,   8240.59,     26.29,   27808.73\r\nsouthwest,  27.9,    16884.92,    34.4,    1826.84,     24.6,    1837.24\r\n"}]};

      function renderCodeList(rootElement, codeList, className, titlePrefix) {
        for (var i = 0; i < codeList.length; i++) {
          var elem = codeList[i];
          var jsElem = document.createElement("div");
          jsElem.className = className;
          var jsElemTitle = document.createElement("h3");
          jsElemTitle.innerHTML = titlePrefix + " " + (i + 1);
          var jsElemBody = document.createElement("code");
          jsElemBody.className = "code-block black-block";
          jsElemBody.innerHTML = "<pre>" + elem.content + "</pre>";
          jsElem.appendChild(jsElemTitle);
          jsElem.appendChild(jsElemBody);
          rootElement.appendChild(jsElem);
        }
      }
      
      function main() {
        // display the assignment
        var codingTitle = document.getElementById("coding-title");
        codingTitle.innerHTML = quizData.title;
        
        var codingInstructions = document.getElementById("coding-instructions");
        if (quizData.hasInstructions) {
          codingInstructions.innerHTML = quizData.instructions;
        } else {
          codingInstructions.innerHTML = "<span class=\"italic-text\">" + quizData.instructions
            + "</span>";
        }

        // display the test(s)
        var codingTests = document.getElementById("coding-tests");
        if (!quizData.hasTests) {
          codingTests.innerHTML = "<span class=\"italic-text\">" + quizData.tests + "</span>";
        } else {
          renderCodeList(codingTests, quizData.tests, "coding-test", "Test");
        }
        

        // display the solution(s)
        var codingSolutions = document.getElementById("coding-solutions");
        if (!quizData.hasSolutions) {
          codingSolutions.innerHTML = "<span class=\"italic-text\">" + quizData.solutions + "</span>";
        } else {
          renderCodeList(codingSolutions, quizData.solutions, "coding-solution", "Solution");
        }
      }
    </script>
  </body>
</html>
