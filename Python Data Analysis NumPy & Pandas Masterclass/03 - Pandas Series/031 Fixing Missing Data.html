<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Coding Assignment</title>

    <style>
      body {
        font-family: sf pro text, -apple-system, BlinkMacSystemFont, Roboto,
          segoe ui, Helvetica, Arial, sans-serif, apple color emoji,
          segoe ui emoji, segoe ui symbol;
        font-weight: 400;
        line-height: 22.4px;
        font-size: 16px;
      }
      p, ul, ol {
        font-size: 16px;
        font-weight: 400;
      }
      h1, h2, h3, h4, h5, h6 {
        font-weight: bold;
      }
      ul {
        list-style: none;
        margin: 0;
        padding: 0;
        max-width: none;
      }
      .code-snippet {
        background-color: #fff;
        border: 1px solid #d1d7dc;
        color: #b4690e;
        font-size: 90%;
        padding: 0.2rem 0.4rem;
      }
      .code-block {
        background-color: #fff;
        color: #b4690e;
        font-size: 90%;
      }
      .black-block {
        color: #000000;
      }
      .italic-text {
        font-style: italic;
      }
    </style>
  </head>

  <body onload="main()">
    <h1 id="coding-title"></h1>
    <div>
      <h2>Instructions</h2>
      <div id="coding-instructions"></div>
    </div>
    <div>
      <h2>Test(s)</h2>
      <div id="coding-tests"></div>
    </div>
    <div>
      <h2>Solution(s)</h2>
      <div id="coding-solutions"></div>
    </div>

    <script>
      const quizData = {"title": "031 Fixing Missing Data", "hasInstructions": true, "hasTests": true, "hasSolutions": true, "instructions": "<p>You are given a Pandas Series called <em>age_data</em> that contains a set of ages, including some missing values and an unusually high age value (110). Your task is to calculate the number of missing entries, compute the median of the ages, and then fill in the missing values using this median.</p>", "tests": [{"file_name": "evaluate.py", "content": "from unittest import TestCase\r\nimport pandas as pd\r\nimport numpy as np\r\n\r\nclass Evaluate(TestCase):\r\n    def test_missing_data_handling(self):\r\n        import exercise\r\n\r\n        # Check for correct number of initially missing values\r\n        self.assertEqual(exercise.missing_count, 3, \"The number of missing values should be 3.\")\r\n\r\n        # Ensure the median is calculated including the outlier\r\n        expected_median = 42  # Median calculated with the outlier present\r\n        self.assertEqual(exercise.median_age, expected_median, \"The median should include the outlier value.\")\r\n\r\n        # Ensure all missing values are filled and no NaNs remain\r\n        self.assertFalse(exercise.age_data_filled.isna().any(), \"There should be no NaN values after filling.\")\r\n\r\n"}], "solutions": [{"file_name": "exercise.py", "content": "import pandas as pd\r\nimport numpy as np\r\n\r\n# Provided list of ages with missing values and an outlier\r\nage_data = pd.Series([25, np.nan, 30, 45, 110, 37, np.nan, 42, np.nan, 52])\r\n\r\n# Calculate the number of missing values\r\nmissing_count = age_data.isna().sum()\r\nprint(\"Number of missing values:\", missing_count)\r\n\r\n# Calculate the median of the age data including the outlier\r\nmedian_age = age_data.median()\r\n\r\n# Fill missing values with the median age\r\nage_data_filled = age_data.fillna(median_age)\r\n\r\n# Output the result\r\nprint(\"Data after median imputation:\")\r\nprint(age_data_filled)\r\n\r\n"}]};

      function renderCodeList(rootElement, codeList, className, titlePrefix) {
        for (var i = 0; i < codeList.length; i++) {
          var elem = codeList[i];
          var jsElem = document.createElement("div");
          jsElem.className = className;
          var jsElemTitle = document.createElement("h3");
          jsElemTitle.innerHTML = titlePrefix + " " + (i + 1);
          var jsElemBody = document.createElement("code");
          jsElemBody.className = "code-block black-block";
          jsElemBody.innerHTML = "<pre>" + elem.content + "</pre>";
          jsElem.appendChild(jsElemTitle);
          jsElem.appendChild(jsElemBody);
          rootElement.appendChild(jsElem);
        }
      }
      
      function main() {
        // display the assignment
        var codingTitle = document.getElementById("coding-title");
        codingTitle.innerHTML = quizData.title;
        
        var codingInstructions = document.getElementById("coding-instructions");
        if (quizData.hasInstructions) {
          codingInstructions.innerHTML = quizData.instructions;
        } else {
          codingInstructions.innerHTML = "<span class=\"italic-text\">" + quizData.instructions
            + "</span>";
        }

        // display the test(s)
        var codingTests = document.getElementById("coding-tests");
        if (!quizData.hasTests) {
          codingTests.innerHTML = "<span class=\"italic-text\">" + quizData.tests + "</span>";
        } else {
          renderCodeList(codingTests, quizData.tests, "coding-test", "Test");
        }
        

        // display the solution(s)
        var codingSolutions = document.getElementById("coding-solutions");
        if (!quizData.hasSolutions) {
          codingSolutions.innerHTML = "<span class=\"italic-text\">" + quizData.solutions + "</span>";
        } else {
          renderCodeList(codingSolutions, quizData.solutions, "coding-solution", "Solution");
        }
      }
    </script>
  </body>
</html>
