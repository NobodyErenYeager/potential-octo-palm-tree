<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Coding Assignment</title>

    <style>
      body {
        font-family: sf pro text, -apple-system, BlinkMacSystemFont, Roboto,
          segoe ui, Helvetica, Arial, sans-serif, apple color emoji,
          segoe ui emoji, segoe ui symbol;
        font-weight: 400;
        line-height: 22.4px;
        font-size: 16px;
      }
      p, ul, ol {
        font-size: 16px;
        font-weight: 400;
      }
      h1, h2, h3, h4, h5, h6 {
        font-weight: bold;
      }
      ul {
        list-style: none;
        margin: 0;
        padding: 0;
        max-width: none;
      }
      .code-snippet {
        background-color: #fff;
        border: 1px solid #d1d7dc;
        color: #b4690e;
        font-size: 90%;
        padding: 0.2rem 0.4rem;
      }
      .code-block {
        background-color: #fff;
        color: #b4690e;
        font-size: 90%;
      }
      .black-block {
        color: #000000;
      }
      .italic-text {
        font-style: italic;
      }
    </style>
  </head>

  <body onload="main()">
    <h1 id="coding-title"></h1>
    <div>
      <h2>Instructions</h2>
      <div id="coding-instructions"></div>
    </div>
    <div>
      <h2>Test(s)</h2>
      <div id="coding-tests"></div>
    </div>
    <div>
      <h2>Solution(s)</h2>
      <div id="coding-solutions"></div>
    </div>

    <script>
      const quizData = {"title": "010 Duplicate Index Values & Resetting The Index", "hasInstructions": true, "hasTests": true, "hasSolutions": true, "instructions": "<p>You are provided with a Pandas Series containing ages with duplicate index values representing names. Your task is to reset the index of this Series to remove the duplicate indices and replace them with a default integer index.</p>", "tests": [{"file_name": "evaluate.py", "content": "from unittest import TestCase\r\nimport pandas as pd\r\n\r\nclass Evaluate(TestCase):\r\n    def test_reset_index(self):\r\n        import exercise\r\n\r\n        # Check the initial series contains duplicates\r\n        self.assertTrue(exercise.ages.index.duplicated().any(), \"Initial Series should have duplicate indices.\")\r\n        \r\n        # Check if the index has been reset in the student's solution\r\n        self.assertIsInstance(exercise.unique_ages.index, pd.RangeIndex, \"Index after reset should be a RangeIndex.\")\r\n        self.assertFalse(exercise.unique_ages.index.duplicated().any(), \"Series after index reset should not have duplicate indices.\")\r\n        self.assertEqual(len(exercise.unique_ages), 7, \"The length of the series after index reset should remain the same.\")\r\n\r\n        \r\n"}], "solutions": [{"file_name": "exercise.py", "content": "import pandas as pd\r\n\r\n# Provided series of ages with duplicate index values\r\nages = pd.Series([25, 30, 35, 40, 45, 25, 30], \r\n                 index=['Alice', 'Bob', 'Charlie', 'David', 'Eve', 'Alice', 'Bob'])\r\n\r\n# Display the series with duplicate index values\r\nprint(\"Original Series with Duplicate Indices:\")\r\nprint(ages)\r\n\r\n# Reset the index of the series to remove duplicates and maintain a unique numerical index\r\nunique_ages = ages.reset_index(drop=True)\r\n\r\n# Output the result\r\nprint(\"Series after Resetting Index:\")\r\nprint(unique_ages)\r\n"}]};

      function renderCodeList(rootElement, codeList, className, titlePrefix) {
        for (var i = 0; i < codeList.length; i++) {
          var elem = codeList[i];
          var jsElem = document.createElement("div");
          jsElem.className = className;
          var jsElemTitle = document.createElement("h3");
          jsElemTitle.innerHTML = titlePrefix + " " + (i + 1);
          var jsElemBody = document.createElement("code");
          jsElemBody.className = "code-block black-block";
          jsElemBody.innerHTML = "<pre>" + elem.content + "</pre>";
          jsElem.appendChild(jsElemTitle);
          jsElem.appendChild(jsElemBody);
          rootElement.appendChild(jsElem);
        }
      }
      
      function main() {
        // display the assignment
        var codingTitle = document.getElementById("coding-title");
        codingTitle.innerHTML = quizData.title;
        
        var codingInstructions = document.getElementById("coding-instructions");
        if (quizData.hasInstructions) {
          codingInstructions.innerHTML = quizData.instructions;
        } else {
          codingInstructions.innerHTML = "<span class=\"italic-text\">" + quizData.instructions
            + "</span>";
        }

        // display the test(s)
        var codingTests = document.getElementById("coding-tests");
        if (!quizData.hasTests) {
          codingTests.innerHTML = "<span class=\"italic-text\">" + quizData.tests + "</span>";
        } else {
          renderCodeList(codingTests, quizData.tests, "coding-test", "Test");
        }
        

        // display the solution(s)
        var codingSolutions = document.getElementById("coding-solutions");
        if (!quizData.hasSolutions) {
          codingSolutions.innerHTML = "<span class=\"italic-text\">" + quizData.solutions + "</span>";
        } else {
          renderCodeList(codingSolutions, quizData.solutions, "coding-solution", "Solution");
        }
      }
    </script>
  </body>
</html>
