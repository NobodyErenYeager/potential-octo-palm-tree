<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Coding Assignment</title>

    <style>
      body {
        font-family: sf pro text, -apple-system, BlinkMacSystemFont, Roboto,
          segoe ui, Helvetica, Arial, sans-serif, apple color emoji,
          segoe ui emoji, segoe ui symbol;
        font-weight: 400;
        line-height: 22.4px;
        font-size: 16px;
      }
      p, ul, ol {
        font-size: 16px;
        font-weight: 400;
      }
      h1, h2, h3, h4, h5, h6 {
        font-weight: bold;
      }
      ul {
        list-style: none;
        margin: 0;
        padding: 0;
        max-width: none;
      }
      .code-snippet {
        background-color: #fff;
        border: 1px solid #d1d7dc;
        color: #b4690e;
        font-size: 90%;
        padding: 0.2rem 0.4rem;
      }
      .code-block {
        background-color: #fff;
        color: #b4690e;
        font-size: 90%;
      }
      .black-block {
        color: #000000;
      }
      .italic-text {
        font-style: italic;
      }
    </style>
  </head>

  <body onload="main()">
    <h1 id="coding-title"></h1>
    <div>
      <h2>Instructions</h2>
      <div id="coding-instructions"></div>
    </div>
    <div>
      <h2>Test(s)</h2>
      <div id="coding-tests"></div>
    </div>
    <div>
      <h2>Solution(s)</h2>
      <div id="coding-solutions"></div>
    </div>

    <script>
      const quizData = {"title": "003 Series Basics", "hasInstructions": true, "hasTests": true, "hasSolutions": true, "instructions": "<p>Convert the NumPy array&nbsp; <code>ages</code>&nbsp; into a Pandas Series and store it in the variable <code>ages_series.</code><br><br>Then convert the data type of the Series to float, and store the converted series in the variable&nbsp; <code>ages_float</code> </p>", "tests": [{"file_name": "evaluate.py", "content": "import sys\r\nfrom unittest import TestCase\r\nimport pandas as pd\r\nimport numpy as np\r\n \r\nfrom numpy.testing import assert_equal\r\n\r\nage_series = pd.Series([25, 12, 15, 64, 35, 80, 45, 10, 22, 55])\r\nage_float = age_series.astype(\"float\")\r\n \r\nclass Evaluate(TestCase):\r\n    def test_series(self):\r\n        import exercise  # Imports and runs student's solution\r\n        series = exercise.ages_series  # Returns output since this function started\r\n        float_series = exercise.ages_float\r\n        assert_equal(series.all(), age_series.all())\r\n        assert_equal(series.all(), age_float.all())", "type": ""}], "solutions": [{"file_name": "exercise.py", "content": "import numpy as np\r\nimport pandas as pd\r\n\r\n# Provided array of ages\r\nages = np.array([25, 12, 15, 64, 35, 80, 45, 10, 22, 55])\r\n\r\nages_series = pd.Series(ages)\r\n\r\nprint(ages.dtype)\r\n\r\nages_float = ages_series.astype(\"float\")\r\n\r\nprint(ages_float)", "type": ""}]};

      function renderCodeList(rootElement, codeList, className, titlePrefix) {
        for (var i = 0; i < codeList.length; i++) {
          var elem = codeList[i];
          var jsElem = document.createElement("div");
          jsElem.className = className;
          var jsElemTitle = document.createElement("h3");
          jsElemTitle.innerHTML = titlePrefix + " " + (i + 1);
          var jsElemBody = document.createElement("code");
          jsElemBody.className = "code-block black-block";
          jsElemBody.innerHTML = "<pre>" + elem.content + "</pre>";
          jsElem.appendChild(jsElemTitle);
          jsElem.appendChild(jsElemBody);
          rootElement.appendChild(jsElem);
        }
      }
      
      function main() {
        // display the assignment
        var codingTitle = document.getElementById("coding-title");
        codingTitle.innerHTML = quizData.title;
        
        var codingInstructions = document.getElementById("coding-instructions");
        if (quizData.hasInstructions) {
          codingInstructions.innerHTML = quizData.instructions;
        } else {
          codingInstructions.innerHTML = "<span class=\"italic-text\">" + quizData.instructions
            + "</span>";
        }

        // display the test(s)
        var codingTests = document.getElementById("coding-tests");
        if (!quizData.hasTests) {
          codingTests.innerHTML = "<span class=\"italic-text\">" + quizData.tests + "</span>";
        } else {
          renderCodeList(codingTests, quizData.tests, "coding-test", "Test");
        }
        

        // display the solution(s)
        var codingSolutions = document.getElementById("coding-solutions");
        if (!quizData.hasSolutions) {
          codingSolutions.innerHTML = "<span class=\"italic-text\">" + quizData.solutions + "</span>";
        } else {
          renderCodeList(codingSolutions, quizData.solutions, "coding-solution", "Solution");
        }
      }
    </script>
  </body>
</html>
