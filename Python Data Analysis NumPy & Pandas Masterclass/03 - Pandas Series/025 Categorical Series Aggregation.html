<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Coding Assignment</title>

    <style>
      body {
        font-family: sf pro text, -apple-system, BlinkMacSystemFont, Roboto,
          segoe ui, Helvetica, Arial, sans-serif, apple color emoji,
          segoe ui emoji, segoe ui symbol;
        font-weight: 400;
        line-height: 22.4px;
        font-size: 16px;
      }
      p, ul, ol {
        font-size: 16px;
        font-weight: 400;
      }
      h1, h2, h3, h4, h5, h6 {
        font-weight: bold;
      }
      ul {
        list-style: none;
        margin: 0;
        padding: 0;
        max-width: none;
      }
      .code-snippet {
        background-color: #fff;
        border: 1px solid #d1d7dc;
        color: #b4690e;
        font-size: 90%;
        padding: 0.2rem 0.4rem;
      }
      .code-block {
        background-color: #fff;
        color: #b4690e;
        font-size: 90%;
      }
      .black-block {
        color: #000000;
      }
      .italic-text {
        font-style: italic;
      }
    </style>
  </head>

  <body onload="main()">
    <h1 id="coding-title"></h1>
    <div>
      <h2>Instructions</h2>
      <div id="coding-instructions"></div>
    </div>
    <div>
      <h2>Test(s)</h2>
      <div id="coding-tests"></div>
    </div>
    <div>
      <h2>Solution(s)</h2>
      <div id="coding-solutions"></div>
    </div>

    <script>
      const quizData = {"title": "025 Categorical Series Aggregation", "hasInstructions": true, "hasTests": true, "hasSolutions": true, "instructions": "<p>You have a Pandas Series named <strong>age_groups</strong> containing labels of different age groups. Your task is to calculate the proportion of each age group relative to the total using the <strong>.value_counts(normalize=True)</strong> method. This should provide the relative frequency of each age group as a decimal.</p>", "tests": [{"file_name": "evaluate.py", "content": "from unittest import TestCase\r\nimport pandas as pd\r\n\r\nclass Evaluate(TestCase):\r\n    def test_age_group_proportions(self):\r\n        import exercise\r\n\r\n        # Expected series proportions sorted by index for comparison\r\n        expected_proportions = pd.Series({'Adult': 0.6, 'Child': 0.2, 'Teen': 0.2}).sort_index()\r\n        \r\n        # Get the student's proportions and sort by index for comparison\r\n        student_proportions = exercise.age_group_proportions.sort_index()\r\n        \r\n        # Check if the proportions sum to 1 (or 100%)\r\n        self.assertAlmostEqual(student_proportions.sum(), 1.0, places=1,\r\n                               msg=\"The proportions of the age groups should sum up to 1.\")\r\n        \r\n        # Check if the proportions are calculated correctly\r\n        for label, expected_value in expected_proportions.items():\r\n            student_value = student_proportions.get(label, None)\r\n            self.assertIsNotNone(student_value, f\"Missing proportion for {label}\")\r\n            self.assertAlmostEqual(student_value, expected_value, places=1,\r\n                                   msg=f\"Proportion for {label} is incorrect.\")\r\n"}], "solutions": [{"file_name": "exercise.py", "content": "import pandas as pd\r\n\r\n# Provided series of age groups\r\nage_groups = pd.Series([\r\n    'Adult', 'Child', 'Adult', 'Teen', 'Adult', \r\n    'Child', 'Teen', 'Adult', 'Adult', 'Adult'\r\n])\r\n\r\n\r\n# Calculate the proportion of each age group\r\nage_group_proportions = age_groups.value_counts(normalize=True)\r\n\r\n# Output the proportions\r\nprint(\"Age Group Proportions:\")\r\nprint(age_group_proportions)\r\n"}]};

      function renderCodeList(rootElement, codeList, className, titlePrefix) {
        for (var i = 0; i < codeList.length; i++) {
          var elem = codeList[i];
          var jsElem = document.createElement("div");
          jsElem.className = className;
          var jsElemTitle = document.createElement("h3");
          jsElemTitle.innerHTML = titlePrefix + " " + (i + 1);
          var jsElemBody = document.createElement("code");
          jsElemBody.className = "code-block black-block";
          jsElemBody.innerHTML = "<pre>" + elem.content + "</pre>";
          jsElem.appendChild(jsElemTitle);
          jsElem.appendChild(jsElemBody);
          rootElement.appendChild(jsElem);
        }
      }
      
      function main() {
        // display the assignment
        var codingTitle = document.getElementById("coding-title");
        codingTitle.innerHTML = quizData.title;
        
        var codingInstructions = document.getElementById("coding-instructions");
        if (quizData.hasInstructions) {
          codingInstructions.innerHTML = quizData.instructions;
        } else {
          codingInstructions.innerHTML = "<span class=\"italic-text\">" + quizData.instructions
            + "</span>";
        }

        // display the test(s)
        var codingTests = document.getElementById("coding-tests");
        if (!quizData.hasTests) {
          codingTests.innerHTML = "<span class=\"italic-text\">" + quizData.tests + "</span>";
        } else {
          renderCodeList(codingTests, quizData.tests, "coding-test", "Test");
        }
        

        // display the solution(s)
        var codingSolutions = document.getElementById("coding-solutions");
        if (!quizData.hasSolutions) {
          codingSolutions.innerHTML = "<span class=\"italic-text\">" + quizData.solutions + "</span>";
        } else {
          renderCodeList(codingSolutions, quizData.solutions, "coding-solution", "Solution");
        }
      }
    </script>
  </body>
</html>
